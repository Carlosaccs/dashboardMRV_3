<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard MRV SP</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body, html { height: 100vh; overflow: hidden; background: #fff; }
        
        header { 
            background: rgb(6, 94, 3); height: 50px; display: flex; 
            align-items: center; justify-content: center; color: white; 
            z-index: 100; position: relative;
        }
        
        .main-wrapper { display: flex; height: calc(100% - 50px); width: 100%; background: #fff; }

        /* Coluna Esquerda - Largura Fixa para não quebrar */
        .col-lateral-esq { width: 300px; background: #fff; overflow-y: auto; padding: 10px; border-right: 1px solid #ddd; }
        /* Coluna Direita - Largura Fixa */
        .col-lateral-dir { width: 350px; background: #fff; padding: 15px; overflow-y: auto; border-left: 1px solid #ddd; }
        /* Centro - Flexível */
        .col-central { flex: 1; display: flex; flex-direction: column; background: #fff; position: relative; overflow: hidden; }

        .btRes { 
            width: 100%; padding: 8px 12px; margin-bottom: 4px; background: transparent; 
            border: none; border-left: 5px solid rgb(6, 94, 3); 
            text-align: left; cursor: pointer; font-size: 0.72rem; 
            border-radius: 4px; display: flex; justify-content: space-between; align-items: center;
        }
        .btRes:hover { background: #f4f4f4; border-left-color: #ff8c00; }
        .btRes.ativo { border-left-color: #ff8c00 !important; background: #fff5e6 !important; font-weight: bold; }
        .estoque-status { font-size: 0.65rem; font-weight: bold; color: #666; white-space: nowrap; margin-left: 10px; }

        .centro-topo { height: 40px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 0.9rem; border-bottom: 1px solid #eee; background: #fdfdfd; }
        
        /* Container do Mapa - Mantém a proporção */
        .container-mapas { flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; padding: 10px; }
        .caixa-troca { width: 100%; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; transition: all 0.5s ease; }
        .pos-cima { height: 75%; z-index: 5; }
        .pos-baixo { height: 25%; z-index: 10; cursor: pointer; opacity: 0.7; border-top: 1px solid #eee; background: #f9f9f9; }
        
        svg { width: 100%; height: 100%; display: block; }
        path { stroke: #fff; stroke-width: 0.5; fill: #838383; transition: fill 0.15s; pointer-events: auto; }
        
        .commrv, #grandesaopaulo { fill: rgb(6, 94, 3) !important; cursor: pointer !important; }
        .commrv:hover, #grandesaopaulo:hover { fill: #ff8c00 !important; }
        .path-ativo { fill: #ff8c00 !important; stroke: #000 !important; stroke-width: 1.5px !important; }

        /* Ficha Técnica Estilizada */
        .ficha-card { border-left: 5px solid #ff8c00; padding: 12px; border-radius: 4px; background: #fafafa; margin-top: 15px; }
        .ficha-header { font-size: 0.9rem; color: #065e03; font-weight: bold; text-transform: uppercase; margin-bottom: 8px; }
        .local-info { font-size: 0.75rem; color: #333; margin-bottom: 12px; display: flex; align-items: flex-start; gap: 6px; border-bottom: 1px solid #eee; padding-bottom: 8px; }
        .ficha-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .grid-label { font-weight: bold; color: #666; font-size: 0.65rem; text-transform: uppercase; }
        .grid-valor { font-size: 0.72rem; color: #333; }
    </style>
</head>
<body>

    <header><h1>Residenciais MRV em São Paulo</h1></header>

    <div class="main-wrapper">
        <aside class="col-lateral-esq" id="menu-residenciais">Carregando...</aside>
        
        <main class="col-central">
            <div class="centro-topo" id="display-nome">Selecione uma região</div>
            <div class="container-mapas" id="container-mapas">
                <div id="caixa-a" class="caixa-troca pos-cima"></div>
                <div id="caixa-b" class="caixa-troca pos-baixo"></div>
            </div>
        </main>

        <aside class="col-lateral-dir" id="detalhes-residencial">
            <div style="text-align: center; color: #999; margin-top: 50px;">Selecione um residencial.</div>
        </aside>
    </div>

    <script src="mrv-data.js"></script>
    <script>
        let pathSelecionado = null;
        let botaoSelecionado = null;
        let regiaoAtual = "gsp"; 
        let DADOS_PLANILHA = [];

        async function carregarPlanilha() {
            try {
                const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQzECvkefpM6aWy0IacqqI6l84_ti6zS1lSjcrgL0J4OcrtWZLb63sh7U1ZTQ4nsqDMeTU5ykl8xtDe/pub?output=csv";
                const response = await fetch(url);
                const texto = await response.text();
                const linhas = texto.split(/\r?\n/).filter(l => l.trim() !== "");
                
                DADOS_PLANILHA = linhas.slice(1).map(linha => {
                    const col = linha.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.trim().replace(/^"|"$/g, ''));
                    // Validação para ignorar linhas sujas ou incompletas (como o erro de 3m² que apareceu no print)
                    if (col.length < 5 || col[2] === "" || col[2].includes('m²')) return null;

                    return {
                        id_path: col[0].toLowerCase().trim(), 
                        regiao_csv: col[1].toLowerCase().trim(), 
                        nome: col[2],
                        estoque: parseInt(col[3]) || 0, 
                        rua: col[4], num: col[5], cidade: col[6], entrega: col[7], menor_preco: col[8],
                        plantas: `de ${col[9]} até ${col[10]}`, obra: col[11], dica: col[17], obs: col[18]
                    };
                }).filter(item => item !== null);

                gerarListaGeral();
                desenharIniciais();
            } catch (e) { console.error("Erro ao processar dados:", e); }
        }

        function gerarListaGeral() {
            const menu = document.getElementById('menu-residenciais');
            menu.innerHTML = "";
            DADOS_PLANILHA.forEach(item => {
                const btn = document.createElement('button');
                btn.className = 'btRes';
                btn.id = `btn-${item.nome.replace(/[^a-zA-Z0-9]/g, '')}`;
                btn.innerHTML = `<strong>${item.nome}</strong> <span class="estoque-status">restam ${item.estoque} un.</span>`;
                btn.onclick = () => selecionarResidencial(item, btn);
                menu.appendChild(btn);
            });
        }

        function selecionarResidencial(item, btn) {
            if (botaoSelecionado) botaoSelecionado.classList.remove('ativo');
            const b = btn || document.getElementById(`btn-${item.nome.replace(/[^a-zA-Z0-9]/g, '')}`);
            if (b) { b.classList.add('ativo'); b.scrollIntoView({ behavior: 'smooth', block: 'nearest' }); botaoSelecionado = b; }
            
            // Troca de mapa se o residencial for de outra região
            if (item.regiao_csv === "esp" && regiaoAtual === "gsp") solicitarTroca(true);
            if (item.regiao_csv === "gsp" && regiaoAtual === "esp") solicitarTroca(true);

            const el = document.getElementById(item.id_path);
            if(el) destacarNoMapa(el);
            exibirFicha(item);
        }

        function exibirFicha(item) {
            const painel = document.getElementById('detalhes-residencial');
            const outrosNoBairro = DADOS_PLANILHA.filter(d => d.id_path === item.id_path);
            
            let html = `<div style="font-size:0.75rem; font-weight:bold; color:#065e03; margin-bottom:10px;">Residenciais nesta região:</div>`;
            outrosNoBairro.forEach(v => {
                const ativo = (v.nome === item.nome) ? 'ativo' : '';
                html += `<button class="btRes ${ativo}" onclick='selecionarResidencial(${JSON.stringify(v).replace(/'/g, "&apos;")}, null)'><strong>${v.nome}</strong></button>`;
            });

            html += `
                <div class="ficha-card">
                    <div class="ficha-header">${item.nome}</div>
                    <div class="local-info">📍 ${item.rua}, ${item.num} - ${item.cidade}</div>
                    <div class="ficha-grid">
                        <div class="grid-item"><div class="grid-label">Preço:</div><div class="grid-valor">${item.menor_preco}</div></div>
                        <div class="grid-item"><div class="grid-label">Entrega:</div><div class="grid-valor">${item.entrega}</div></div>
                        <div class="grid-item"><div class="grid-label">Plantas:</div><div class="grid-valor">${item.plantas}</div></div>
                        <div class="grid-item"><div class="grid-label">Obra:</div><div class="grid-valor">${item.obra}%</div></div>
                    </div>
                </div>`;
            painel.innerHTML = html;
        }

        function destacarNoMapa(el) {
            if (pathSelecionado) pathSelecionado.classList.remove('path-ativo');
            el.classList.add('path-ativo');
            pathSelecionado = el;
            document.getElementById('display-nome').innerText = el.getAttribute('data-name');
        }

        function solicitarTroca(manterFicha = false) {
            regiaoAtual = (regiaoAtual === "gsp") ? "esp" : "gsp";
            const cA = document.getElementById('caixa-a'), cB = document.getElementById('caixa-b');
            if (cA.classList.contains('pos-cima')) {
                cA.className = 'caixa-troca pos-baixo'; cB.className = 'caixa-troca pos-cima';
            } else {
                cB.className = 'caixa-troca pos-baixo'; cA.className = 'caixa-troca pos-cima';
            }
            if (!manterFicha) {
                document.getElementById('detalhes-residencial').innerHTML = '<div style="text-align: center; color: #999; margin-top: 50px;">Selecione um residencial.</div>';
                if (pathSelecionado) pathSelecionado.classList.remove('path-ativo');
                pathSelecionado = null;
            }
        }

        function desenhar(idContainer, dados) {
            const container = document.getElementById(idContainer);
            if (!container || !dados) return;
            const paths = dados.paths.map(p => {
                const idLimpo = p.id.toLowerCase().trim();
                const temMRV = DADOS_PLANILHA.some(d => d.id_path === idLimpo);
                return `<path id="${p.id}" data-name="${p.name}" d="${p.d}" class="${p.class || ''} ${temMRV || p.id === 'grandesaopaulo' ? 'commrv' : ''}"></path>`;
            }).join('');
            container.innerHTML = `<svg viewBox="${dados.viewBox}" preserveAspectRatio="xMidYMid meet"><g>${paths}</g></svg>`;
        }

        function desenharIniciais() {
            if (typeof MAPA_GSP !== 'undefined') desenhar('caixa-a', MAPA_GSP);
            if (typeof MAPA_INTERIOR !== 'undefined') desenhar('caixa-b', MAPA_INTERIOR);
        }

        document.getElementById('container-mapas').addEventListener('click', (e) => {
            const p = e.target.closest('.pos-cima path');
            if (p) {
                if (p.id === "grandesaopaulo") { solicitarTroca(false); return; }
                const item = DADOS_PLANILHA.find(d => d.id_path === p.id.toLowerCase().trim());
                if(item) {
                    selecionarResidencial(item, null);
                } else {
                    if (pathSelecionado) pathSelecionado.classList.remove('path-ativo');
                    pathSelecionado = null;
                    document.getElementById('detalhes-residencial').innerHTML = `<div style="text-align: center; color: #999; margin-top: 50px;">Nenhum residencial em ${p.getAttribute('data-name')}.</div>`;
                }
            }
            if (e.target.closest('.pos-baixo')) solicitarTroca(false);
        });

        window.onload = carregarPlanilha;
    </script>
</body>
</html>
