<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard MRV 2.0 - Estrutura Instantânea</title>
    <style>
        /* --- RESET E BASE --- */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Arial, sans-serif; }
        body, html { height: 100%; overflow: hidden; background-color: #f0f0f0; }

        /* --- FAIXA SUPERIOR --- */
        header { 
            background: rgb(6, 94, 3); 
            height: 50px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            position: relative; 
            color: white;
            z-index: 10;
        }
        header h1 { font-size: 20px; font-weight: bold; }
        .btn-sobre { 
            position: absolute; 
            right: 20px; 
            background: rgba(255,255,255,0.2); 
            border: 1px solid white; 
            color: white; 
            padding: 4px 15px; 
            border-radius: 4px; 
            cursor: pointer; 
            font-weight: bold;
        }

        /* --- CONTAINER PRINCIPAL --- */
        .main-wrapper { 
            display: flex; 
            height: calc(100% - 50px); 
            width: 100%; 
        }

        /* CAIXA ESQUERDA (2/9) */
        .col-esquerda { 
            width: calc(100% * 2 / 9); 
            background: white; 
            border: 1px solid #ccc; 
            height: 100%; 
        }

        /* CAIXA DIREITA (3/9) */
        .col-direita { 
            width: calc(100% * 3 / 9); 
            background: white; 
            border: 1px solid #ccc; 
            height: 100%; 
        }

        /* COLUNA CENTRAL (4/9) */
        .col-central { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            height: 100%; 
        }

        /* Caixa 1 (Altura fixa de 50px) */
        .centro-topo { 
            height: 50px; 
            border: 1px solid #ccc; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            font-weight: bold;
            background: white;
        }

        /* Container para as caixas 2 e 3 */
        .container-mapas { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
        }

        /* Estilo das caixas de troca */
        .caixa-troca { 
            width: 100%; 
            /* REMOVIDO: transition: all 0.4s ease-in-out; */
            border: 1px solid #ccc; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            position: relative;
        }

        /* Estado: Caixa em CIMA (75%) */
        .pos-cima { height: 75%; background: white; cursor: default; }

        /* Estado: Caixa em BAIXO (25%) */
        .pos-baixo { height: 25%; cursor: pointer; }

        /* Cor amarela para a caixa específica */
        .caixa-amarela { background: #ffff00; }

    </style>
</head>
<body>

    <header>
        <h1>Residenciais MRV em SP</h1>
        <button class="btn-sobre">Sobre</button>
    </header>

    <div class="main-wrapper">
        <aside class="col-esquerda"></aside>

        <main class="col-central">
            <div class="centro-topo">CAIXA DE TEXTO DINÂMICA</div>

            <div class="container-mapas" id="container-mapas">
                <div id="caixa-a" class="caixa-troca pos-cima">
                    <span>CAIXA 2</span>
                </div>
                
                <div id="caixa-b" class="caixa-troca pos-baixo caixa-amarela" onclick="executarTroca(this)">
                    <span>CAIXA 3</span>
                </div>
            </div>
        </main>

        <aside class="col-direita"></aside>
    </div>

    <script>
        function executarTroca(elementoClicado) {
            // Se já estiver em cima, a função é ignorada
            if (elementoClicado.classList.contains('pos-cima')) return;

            const container = document.getElementById('container-mapas');
            const caixaA = document.getElementById('caixa-a');
            const caixaB = document.getElementById('caixa-b');

            if (caixaB.classList.contains('pos-baixo')) {
                // Caixa B sobe e perde clique
                caixaB.classList.replace('pos-baixo', 'pos-cima');
                caixaB.onclick = null;
                
                // Caixa A desce e ganha clique
                caixaA.classList.replace('pos-cima', 'pos-baixo');
                caixaA.onclick = function() { executarTroca(this); };
                
                container.insertBefore(caixaB, caixaA);
            } else {
                // Caminho inverso (Caso clique na branca quando ela estiver embaixo)
                caixaA.classList.replace('pos-baixo', 'pos-cima');
                caixaA.onclick = null;
                
                caixaB.classList.replace('pos-cima', 'pos-baixo');
                caixaB.onclick = function() { executarTroca(this); };
                
                container.insertBefore(caixaA, caixaB);
            }
        }
    </script>
</body>
</html>
