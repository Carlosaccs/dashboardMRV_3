<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Carregando Dashboard MRV...</title>
    <style>
        body { background: #065e03; display: flex; align-items: center; justify-content: center; height: 100vh; color: white; font-family: sans-serif; }
    </style>
</head>
<body>
    <div>Detectando dispositivo...</div>

    <script>
        // Este teste verifica se o usuário está num celular ou tablet (independente do tamanho da tela)
        const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);

        if (isMobile) {
            window.location.href = "./mobile.html";
        } else {
            window.location.href = "./desktop.html";
        }
    </script>
</body>
</html>
