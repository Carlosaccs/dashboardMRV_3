<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Carregando Dashboard MRV...</title>
    <style>
        body { background: #065e03; display: flex; align-items: center; justify-content: center; height: 100vh; color: white; font-family: sans-serif; }
    </style>
    <script>
        function redirecionar() {
            // Se a largura da tela for menor que 900px, vai para o mobile
            if (window.innerWidth < 900) {
                window.location.href = "./mobile.html";
            } else {
                window.location.href = "./desktop.html";
            }
        }
        // Executa ao carregar
        window.onload = redirecionar;
    </script>
</head>
<body>
    <div>Carregando ferramentas...</div>
</body>
</html>
