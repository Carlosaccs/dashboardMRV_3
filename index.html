<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard MRV SP - Ajustado</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        
        /* Impede qualquer rolagem na página toda */
        body, html { height: 100vh; overflow: hidden; background: #fff; }
        
        header { background: rgb(6, 94, 3); height: 50px; display: flex; align-items: center; justify-content: center; color: white; position: relative; }
        .btn-sobre { position: absolute; right: 20px; background: none; border: 1px solid white; color: white; padding: 5px 10px; cursor: pointer; border-radius: 4px; }

        .main-wrapper { display: flex; height: calc(100% - 50px); width: 100%; }
        .col-lateral-esq { width: calc(100% * 2 / 9); border-right: 1px solid #ccc; }
        .col-lateral-dir { width: calc(100% * 3 / 9); border-left: 1px solid #ccc; }
        
        .col-central { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            height: 100%; 
        }
        
        /* Caixa de Texto fixa em 50px */
        .centro-topo { 
            height: 50px; 
            border-bottom: 1px solid #ccc; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-weight: bold; 
        }

        /* Container que ocupa o que sobra da altura */
        .container-mapas { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            height: calc(100% - 50px); /* Descontando a Caixa de Texto */
        }
        
        /* --- AJUSTE DE ALTURA DAS CAIXAS --- */
        .caixa-troca { 
            width: 100%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            overflow: hidden; 
            padding: 10px;
        }
        
        /* Caixa de Cima: 70% do espaço restante */
        .pos-cima { 
            height: 70%; 
            background: white; 
            border-bottom: 1px solid #ccc;
        }
        
        /* Caixa de Baixo: 30% do espaço restante */
        .pos-baixo { 
            height: 30%; 
            background: #ffff00; 
            cursor: pointer; 
        }

        /* Mantém o SVG sempre dentro da caixa sem distorcer */
        svg { 
            max-width: 100%; 
            max-height: 100%; 
            display: block; 
        }
        
        path { fill: #888; stroke: #fff; stroke-width: 0.5; }
        
        #erro-log { position: fixed; top: 0; left: 0; background: red; color: white; padding: 10px; z-index: 9999; display: none; width: 100%; }
    </style>
</head>
<body>

    <div id="erro-log"></div>

    <header>
        <h1>Residenciais MRV em SP</h1>
        <button class="btn-sobre">Sobre</button>
    </header>

    <div class="main-wrapper">
        <aside class="col-lateral-esq"></aside>
        
        <main class="col-central">
            <div class="centro-topo" id="display-nome">MAPA DE SÃO PAULO</div>
            
            <div class="container-mapas" id="container-mapas">
                <div id="caixa-a" class="caixa-troca pos-cima"></div>
                <div id="caixa-b" class="caixa-troca pos-baixo" onclick="solicitarTroca()"></div>
            </div>
        </main>

        <aside class="col-lateral-dir"></aside>
    </div>

    <script src="mrv-data.js"></script>

    <script>
        function desenhar(idContainer, dados) {
            const container = document.getElementById(idContainer);
            if (!dados) return;
            const paths = dados.paths.map(p => `<path id="${p.id}" d="${p.d}" class="${p.class}"></path>`).join('');
            container.innerHTML = `<svg viewBox="${dados.viewBox}" preserveAspectRatio="xMidYMid meet"><g transform="${dados.transform}">${paths}</g></svg>`;
        }

        function solicitarTroca() {
            const caixaA = document.getElementById('caixa-a');
            const caixaB = document.getElementById('caixa-b');
            const container = document.getElementById('container-mapas');

            if (caixaB.classList.contains('pos-baixo')) {
                caixaB.classList.replace('pos-baixo', 'pos-cima');
                caixaA.classList.replace('pos-cima', 'pos-baixo');
                container.insertBefore(caixaB, caixaA);
                caixaB.onclick = null;
                caixaA.onclick = solicitarTroca;
            } else {
                caixaA.classList.replace('pos-baixo', 'pos-cima');
                caixaB.classList.replace('pos-cima', 'pos-baixo');
                container.insertBefore(caixaA, caixaB);
                caixaA.onclick = null;
                caixaB.onclick = solicitarTroca;
            }
        }

        window.onload = () => {
            try {
                desenhar('caixa-a', MAPA_GSP);
                desenhar('caixa-b', MAPA_INTERIOR);
            } catch (e) {
                console.error(e);
            }
        };
    </script>
</body>
</html>
