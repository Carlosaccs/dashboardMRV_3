<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard MRV SP - Fix Mapas</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body, html { height: 100vh; overflow: hidden; background: #fff; }
        
        header { 
            background: rgb(6, 94, 3); height: 50px; display: flex; 
            align-items: center; justify-content: center; color: white; 
            z-index: 100; position: relative; 
        }
        
        .main-wrapper { display: flex; height: calc(100% - 50px); width: 100%; }

        /* Colunas */
        .col-lateral-esq { width: 22%; border-right: 1px solid #ccc; background: #fdfdfd; overflow-y: auto; padding: 5px; }
        .col-central { width: 45%; display: flex; flex-direction: column; background: #fff; overflow: hidden; border-right: 1px solid #ccc; }
        .col-lateral-dir { width: 33%; background: #fdfdfd; padding: 15px; overflow-y: auto; }

        /* Botões da Esquerda - Estilo image_17ee01.jpg */
        .btRes { 
            width: 100%; padding: 10px; margin-bottom: 4px; background: #fff; border: 1px solid #ddd; 
            border-left: 5px solid transparent; text-align: left; cursor: pointer; font-size: 0.75rem; 
            border-radius: 4px; display: flex; justify-content: space-between; align-items: center;
        }
        .btRes:hover { background: #f0f0f0; }
        .btRes.ativo { 
            border-left: 5px solid #ff8c00 !important; 
            background: #fff5e6 !important; 
            font-weight: bold; 
        }
        .estoque-status { font-size: 0.65rem; color: #666; font-weight: bold; }

        /* Centro e Mapas - AQUI ESTÁ A CORREÇÃO DO ESTOURO */
        .centro-topo { 
            height: 45px; border-bottom: 1px solid #eee; display: flex; 
            align-items: center; justify-content: center; font-weight: bold; font-size: 1rem;
        }
        
        .container-mapas { flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; }
        
        .caixa-troca { 
            width: 100%; display: flex; align-items: center; justify-content: center; 
            overflow: hidden; position: relative; padding: 15px;
        }
        
        .pos-cima { height: 70%; }
        .pos-baixo { height: 30%; cursor: pointer; background: #fafafa; border-top: 1px solid #eee; }

        /* Regras Críticas para o SVG não vazar */
        svg { 
            width: 100%; 
            height: 100%; 
            display: block; 
            pointer-events: none; 
            max-width: 100%; 
            max-height: 100%;
        }
        
        path { stroke: #fff; stroke-width: 0.5; fill: #b0b0b0; transition: 0.3s; cursor: pointer; pointer-events: all; }
        .commrv, #grandesaopaulo { fill: rgb(6, 94, 3) !important; }
        .path-ativo { fill: #ff8c00 !important; stroke: #000; stroke-width: 1.5px; }

        /* Painel Direito */
        .titulo-vizinhos { font-size: 0.75rem; font-weight: bold; color: rgb(6, 94, 3); margin-bottom: 8px; text-transform: uppercase; }
        .box-dica { background: #f1f9f1; border-left: 4px solid #388e3c; padding: 10px; font-size: 0.8rem; margin-bottom: 10px; border-radius: 4px; }
        .ficha-card { border: 1px solid #eee; border-top: 4px solid #ff8c00; padding: 15px; border-radius: 4px; background: white; margin-bottom: 10px; }
        .ficha-nome { font-size: 1.1rem; color: #ff8c00; font-weight: bold; margin-bottom: 10px; display: block; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        
        .grid-info { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 10px 0; }
        .item-info { font-size: 0.8rem; color: #333; }
        .item-info strong { display: block; font-size: 0.65rem; color: #999; text-transform: uppercase; }

        .btn-acao { width: 100%; padding: 12px; margin-top: 6px; border: none; border-radius: 4px; color: white; font-weight: bold; cursor: pointer; font-size: 0.8rem; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-book { background: #065e03; }
        .btn-video { background: #ff8c00; }
    </style>
</head>
<body>

    <header><h1>Dashboard MRV - São Paulo</h1></header>

    <div class="main-wrapper">
        <aside class="col-lateral-esq" id="menu-residenciais">Lendo planilha...</aside>
        
        <main class="col-central">
            <div class="centro-topo" id="display-nome">Selecione uma região</div>
            <div class="container-mapas" id="container-mapas">
                <div id="caixa-a" class="caixa-troca pos-cima"></div>
                <div id="caixa-b" class="caixa-troca pos-baixo" onclick="trocarMapas()"></div>
            </div>
        </main>

        <aside class="col-lateral-dir" id="detalhes-residencial">
            <div style="text-align: center; color: #999; margin-top: 50px;">Aguardando seleção...</div>
        </aside>
    </div>

    <script src="mrv-data.js"></script>
    <script>
        let pathSelecionado = null;
        let botaoSelecionado = null;
        let regiaoAtual = "gsp"; 
        let DADOS_PLANILHA = [];

        async function carregarPlanilha() {
            try {
                const response = await fetch("https://docs.google.com/spreadsheets/d/e/2PACX-1vQzECvkefpM6aWy0IacqqI6l84_ti6zS1lSjcrgL0J4OcrtWZLb63sh7U1ZTQ4nsqDMeTU5ykl8xtDe/pub?output=csv");
                const texto = await response.text();
                const linhas = texto.split(/\r?\n/);
                
                DADOS_PLANILHA = linhas.slice(1).map(linha => {
                    let col = linha.split(/[,;]/).map(c => c.trim().replace(/^["']|["']$/g, ''));
                    
                    // FILTRO DE LIXO (Resolvido)
                    if (col.length < 5 || col[0].includes("IDs") || col[2] === "btRes" || col[2].includes(".pdf")) return null;

                    return {
                        id_path: col[0], 
                        regiao: col[1] ? col[1].toLowerCase() : "", 
                        nome: col[2],
                        estoque: col[3] || "0",
                        endereco: col[4], bairro: col[5], cidade: col[6],
                        entrega: col[7], preco: col[8], 
                        plantas: col[9] + (col[10] ? " até " + col[10] : ""), 
                        obra: col[11] || "0%",
                        obs: col[12], book: col[13], dica: col[14], video1: col[15], video2: col[16]
                    };
                }).filter(item => item !== null);

                DADOS_PLANILHA.sort((a, b) => a.nome.localeCompare(b.nome));
                gerarListaGeral();
            } catch (e) { console.error(e); }
        }

        function gerarListaGeral() {
            const menu = document.getElementById('menu-residenciais');
            menu.innerHTML = "";
            DADOS_PLANILHA.forEach(item => {
                const btn = document.createElement('button');
                btn.className = 'btRes';
                btn.innerHTML = `<div><strong>${item.nome}</strong><br><small style="color:#aaa">${item.bairro || item.cidade}</small></div> 
                                 <span class="estoque-status">${item.estoque} unidades</span>`;
                btn.onclick = () => selecionarResidencial(item, btn);
                menu.appendChild(btn);
            });
        }

        function selecionarResidencial(item, btn) {
            if (!btn) {
                const bts = document.querySelectorAll('.col-lateral-esq .btRes');
                btn = Array.from(bts).find(b => b.innerText.includes(item.nome.toUpperCase()));
            }
            if (botaoSelecionado) botaoSelecionado.classList.remove('ativo');
            if (btn) { btn.classList.add('ativo'); btn.scrollIntoView({ behavior: 'smooth', block: 'nearest' }); botaoSelecionado = btn; }

            if (item.regiao !== regiaoAtual) trocarMapas();
            
            setTimeout(() => {
                const el = document.querySelector('.pos-cima #' + item.id_path);
                if(el) destacarNoMapa(el);
                exibirPainelDireito(item, el ? el.getAttribute('data-name') : item.cidade);
            }, 100);
        }

        function exibirPainelDireito(item, nomeCidade) {
            const painel = document.getElementById('detalhes-residencial');
            let html = `<div class="titulo-vizinhos">TAMBÉM EM ${nomeCidade ? nomeCidade.toUpperCase() : 'ESTA REGIÃO'}:</div>`;
            const vizinhos = DADOS_PLANILHA.filter(d => d.id_path === item.id_path && d.nome !== item.nome);
            vizinhos.forEach(v => {
                html += `<button class="btRes" onclick='selecionarResidencial(${JSON.stringify(v)}, null)'>
                            <strong>${v.nome}</strong> <span class="estoque-status">${v.estoque} un.</span>
                         </button>`;
            });

            html += `<div style="margin-top:15px;">
                ${(item.dica && item.dica !== "---") ? `<div class="box-dica">💡 <strong>Dica:</strong> ${item.dica}</div>` : ''}
                <div class="ficha-card">
                    <span class="ficha-nome">${item.nome}</span>
                    <div class="item-info">📍 <strong>Localização</strong> ${item.endereco || ''}</div>
                    <div class="grid-info">
                        <div class="item-info">💰 <strong>Preço</strong> R$ ${item.preco || '---'}</div>
                        <div class="item-info">🔑 <strong>Entrega</strong> ${item.entrega || '---'}</div>
                        <div class="item-info">📐 <strong>Plantas</strong> ${item.plantas}</div>
                        <div class="item-info">🏗️ <strong>Obra</strong> ${item.obra}</div>
                    </div>
                    ${item.obs && item.obs !== "---" ? `<div style="border-top:1px solid #eee; padding-top:8px; font-size:0.8rem">📝 <strong>Diferenciais:</strong> ${item.obs}</div>` : ''}
                </div>
                <button class="btn-acao btn-book" onclick="window.open('${item.book}')">📄 Copiar Book do Cliente</button>
                <button class="btn-acao btn-video" onclick="window.open('${item.video1}')">🎬 Copiar Vídeo 1</button>
                <button class="btn-acao btn-video" onclick="window.open('${item.video2}')">🎬 Copiar Vídeo 2</button>
            </div>`;
            painel.innerHTML = html;
        }

        function destacarNoMapa(el) {
            if (pathSelecionado) pathSelecionado.classList.remove('path-ativo');
            el.classList.add('path-ativo');
            pathSelecionado = el;
            document.getElementById('display-nome').innerText = el.getAttribute('data-name');
        }

        function trocarMapas() {
            regiaoAtual = (regiaoAtual === "gsp") ? "esp" : "gsp";
            const cA = document.getElementById('caixa-a'), cB = document.getElementById('caixa-b');
            if (cA.classList.contains('pos-cima')) {
                cA.classList.replace('pos-cima', 'pos-baixo'); cA.onclick = trocarMapas;
                cB.classList.replace('pos-baixo', 'pos-cima'); cB.onclick = null;
                document.getElementById('container-mapas').appendChild(cA);
            } else {
                cB.classList.replace('pos-cima', 'pos-baixo'); cB.onclick = trocarMapas;
                cA.classList.replace('pos-baixo', 'pos-cima'); cA.onclick = null;
                document.getElementById('container-mapas').appendChild(cB);
            }
            if (pathSelecionado) pathSelecionado.classList.remove('path-ativo');
            pathSelecionado = null;
        }

        function desenhar(idContainer, dados) {
            const container = document.getElementById(idContainer);
            const paths = dados.paths.map(p => `<path id="${p.id}" data-name="${p.name || p.id}" d="${p.d}" class="${p.class}"></path>`).join('');
            // preserveAspectRatio="xMidYMid meet" garante que o mapa caiba na caixa sem esticar
            container.innerHTML = `<svg viewBox="${dados.viewBox}" preserveAspectRatio="xMidYMid meet">${paths}</svg>`;
        }

        document.getElementById('container-mapas').addEventListener('click', (e) => {
            const p = e.target;
            if (p.tagName !== 'path' || p.closest('.pos-baixo')) return;
            if (p.id === "grandesaopaulo") { trocarMapas(); } 
            else if (p.classList.contains('commrv')) {
                const item = DADOS_PLANILHA.find(d => d.id_path === p.id);
                if(item) selecionarResidencial(item, null);
            }
        });

        document.getElementById('container-mapas').addEventListener('mouseover', (e) => {
            if (e.target.tagName === 'path' && e.target.closest('.pos-cima')) {
                document.getElementById('display-nome').innerText = e.target.getAttribute('data-name');
            }
        });

        window.onload = () => { 
            desenhar('caixa-a', MAPA_GSP); 
            desenhar('caixa-b', MAPA_INTERIOR); 
            carregarPlanilha(); 
        };
    </script>
</body>
</html>
