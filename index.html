<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard MRV SP</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body, html { height: 100vh; overflow: hidden; background: #fff; }
        header { background: rgb(6, 94, 3); height: 50px; display: flex; align-items: center; justify-content: center; color: white; z-index: 10; position: relative; }
        .main-wrapper { display: flex; height: calc(100% - 50px); width: 100%; }

        /* Coluna Central */
        .col-central { flex: 1; display: flex; flex-direction: column; position: relative; border-right: 1px solid #ccc; }
        .centro-topo { height: 45px; border-bottom: 1px solid #ccc; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        
        /* Container do Mapa */
        .container-mapas { flex: 1; display: flex; flex-direction: column; position: relative; overflow: hidden; }
        
        /* BOTÕES DENTRO DA CAIXA DO MAPA */
        #caixa-botoes-mapa {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 200px;
            max-height: 70%;
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid #ccc;
            border-radius: 8px;
            z-index: 100;
            padding: 10px;
            overflow-y: auto;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .btRes { 
            width: 100%; padding: 8px; margin-bottom: 5px; background: #fff; 
            border: 1px solid #ddd; border-left: 4px solid rgb(6, 94, 3); 
            text-align: left; cursor: pointer; font-size: 0.75rem; display: block;
        }
        .btRes:hover { background: #f0f0f0; border-left-color: #ff8c00; }
        .btRes strong { display: block; color: #333; }

        .caixa-troca { width: 100%; display: flex; align-items: center; justify-content: center; }
        .pos-cima { height: 80%; background: white; }
        .pos-baixo { height: 20%; background: #f9f9f9; cursor: pointer; border-top: 2px solid #ddd; }
        
        svg { max-width: 100%; max-height: 100%; transform: scale(1.15); }

        /* Coluna Direita */
        .col-lateral-dir { width: 25%; background: #fdfdfd; padding: 20px; overflow-y: auto; }
        .detalhe-card h2 { color: rgb(6, 94, 3); margin-bottom: 10px; font-size: 1.1rem; border-bottom: 2px solid #ff8c00; padding-bottom: 5px; }
        .info-row { margin-bottom: 10px; font-size: 0.85rem; }
        .info-label { font-weight: bold; color: #666; display: block; font-size: 0.7rem; text-transform: uppercase; }

        /* Estilos dos Paths */
        path { stroke: #fff; stroke-width: 0.5; fill: #8c8c8c; transition: 0.2s; }
        .commrv, #grandesaopaulo { fill: rgb(6, 94, 3) !important; cursor: pointer; }
        .pos-cima .commrv:hover, .pos-cima #grandesaopaulo:hover { fill: #ff8c00 !important; }
        .path-ativo { fill: #ff8c00 !important; stroke: #000; stroke-width: 1px; }
        .pos-baixo path { pointer-events: none; }
    </style>
</head>
<body>

    <header><h1>Dashboard de Vendas MRV</h1></header>

    <div class="main-wrapper">
        <main class="col-central">
            <div class="centro-topo" id="display-nome">Selecione uma região</div>
            
            <div class="container-mapas" id="container-mapas">
                <div id="caixa-botoes-mapa">
                    <p style="font-size: 0.7rem; color: #999; margin-bottom: 5px; text-align: center;">Residenciais:</p>
                    <div id="lista-interna">Carregando...</div>
                </div>

                <div id="caixa-a" class="caixa-troca pos-cima"></div>
                <div id="caixa-b" class="caixa-troca pos-baixo" onclick="solicitarTroca()"></div>
            </div>
        </main>

        <aside class="col-lateral-dir" id="detalhes-residencial">
            <p style="color: #999; text-align: center; margin-top: 20px;">Clique em um residencial para ver detalhes.</p>
        </aside>
    </div>

    <script src="mrv-data.js"></script>

    <script>
        let pathSelecionado = null;
        let regiaoAtual = "gsp"; 
        let DADOS_PLANILHA = [];

        // COLE SEU LINK CSV AQUI
        const LINK_CSV = "SUA_URL_DO_GOOGLE_SHEETS_AQUI";

        function carregarPlanilha() {
            Papa.parse(LINK_CSV, {
                download: true,
                header: true, // Usa a primeira linha da planilha como nome dos campos
                complete: function(results) {
                    DADOS_PLANILHA = results.data;
                    console.log("Planilha carregada:", DADOS_PLANILHA);
                    atualizarBotoes();
                },
                error: function() {
                    document.getElementById('lista-interna').innerText = "Erro ao ler CSV.";
                }
            });
        }

        function atualizarBotoes() {
            const lista = document.getElementById('lista-interna');
            lista.innerHTML = "";
            
            // Filtra pela coluna "Regiao" (tem que ser igual ao nome na sua planilha)
            const filtrados = DADOS_PLANILHA.filter(item => {
                const r = item.Regiao || item.regiao || "";
                return r.toLowerCase().trim() === regiaoAtual;
            });

            if (filtrados.length === 0) {
                lista.innerHTML = "<p style='font-size:0.7rem;'>Nenhum registro.</p>";
                return;
            }

            filtrados.forEach(item => {
                const btn = document.createElement('button');
                btn.className = 'btRes';
                // Usa os nomes exatos das suas colunas: btRes e Cidade
                btn.innerHTML = `<strong>${item.btRes || 'Sem nome'}</strong>${item.Cidade || ''}`;
                
                btn.onclick = () => {
                    const el = document.getElementById(item.IDsDosPaths);
                    if(el) {
                        if(el.closest('.pos-baixo')) solicitarTroca();
                        el.dispatchEvent(new Event('click'));
                    }
                    exibirDetalhes(item);
                };
                lista.appendChild(btn);
            });
        }

        function exibirDetalhes(item) {
            const painel = document.getElementById('detalhes-residencial');
            painel.innerHTML = `
                <div class="detalhe-card">
                    <h2>${item.btRes}</h2>
                    <div class="info-row"><span class="info-label">📍 Endereço</span>${item.Endereco || ''}, ${item.Bairro || ''} - ${item.Cidade || ''}</div>
                    <div class="info-row"><span class="info-label">💰 Valor</span>R$ ${item.MenorPreco || item.Preco || 'Sob consulta'}</div>
                    <div class="info-row"><span class="info-label">🏗️ Status</span>${item.Obra || ''}</div>
                    <div class="info-row"><span class="info-label">📅 Entrega</span>${item.PrevisaoDeEntrega || ''}</div>
                </div>`;
        }

        function desenhar(idContainer, dados) {
            const container = document.getElementById(idContainer);
            if (!dados) return;
            const paths = dados.paths.map(p => `<path id="${p.id}" data-name="${p.name || p.id}" d="${p.d}" class="${p.class}"></path>`).join('');
            container.innerHTML = `<svg viewBox="${dados.viewBox}" preserveAspectRatio="xMidYMid meet"><g transform="${dados.transform}">${paths}</g></svg>`;
            vincularEventos();
        }

        function vincularEventos() {
            const paths = document.querySelectorAll('.pos-cima path');
            const display = document.getElementById('display-nome');
            
            paths.forEach(p => {
                p.onmouseover = () => {
                    display.innerText = p.getAttribute('data-name');
                };
                p.onmouseout = () => { display.innerText = pathSelecionado ? pathSelecionado.getAttribute('data-name') : "Selecione uma região"; };
                
                p.onclick = (e) => {
                    e.stopPropagation();
                    if (p.id === "grandesaopaulo") { solicitarTroca(); return; }
                    
                    if (p.classList.contains('commrv')) {
                        if (pathSelecionado) pathSelecionado.classList.remove('path-ativo');
                        p.classList.add('path-ativo');
                        pathSelecionado = p;
                        
                        // Busca na planilha pelo ID do path
                        const item = DADOS_PLANILHA.find(d => d.IDsDosPaths === p.id);
                        if(item) exibirDetalhes(item);
                    }
                };
            });
        }

        function solicitarTroca() {
            regiaoAtual = (regiaoAtual === "gsp") ? "esp" : "gsp";
            const caixaA = document.getElementById('caixa-a');
            const caixaB = document.getElementById('caixa-b');
            const container = document.getElementById('container-mapas');
            
            if (pathSelecionado) pathSelecionado.classList.remove('path-ativo');
            pathSelecionado = null;

            if (caixaB.classList.contains('pos-baixo')) {
                caixaB.classList.replace('pos-baixo', 'pos-cima');
                caixaA.classList.replace('pos-cima', 'pos-baixo');
                container.appendChild(caixaA); 
                caixaB.onclick = null;
                caixaA.onclick = solicitarTroca;
            } else {
                caixaA.classList.replace('pos-baixo', 'pos-cima');
                caixaB.classList.replace('pos-cima', 'pos-baixo');
                container.appendChild(caixaB);
                caixaA.onclick = null;
                caixaB.onclick = solicitarTroca;
            }
            vincularEventos();
            atualizarBotoes();
        }

        window.onload = () => {
            desenhar('caixa-a', MAPA_GSP);
            desenhar('caixa-b', MAPA_INTERIOR);
            carregarPlanilha();
        };
    </script>
</body>
</html>
