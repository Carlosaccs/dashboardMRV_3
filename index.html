<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard MRV SP - Estabilizado</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body, html { height: 100vh; overflow: hidden; background: #fff; }
        
        header { 
            background: rgb(6, 94, 3); height: 50px; display: flex; 
            align-items: center; justify-content: center; color: white; 
            z-index: 1000; position: relative;
        }
        
        .main-wrapper { display: flex; height: calc(100% - 50px); width: 100%; }

        /* Colunas Laterais */
        .col-lateral-esq { width: 22%; border-right: 1px solid #ddd; background: #fdfdfd; overflow-y: auto; padding: 10px; }
        .col-lateral-dir { width: 28%; border-left: 1px solid #ddd; background: #fdfdfd; padding: 15px; overflow-y: auto; }

        /* Botões Residenciais */
        .btRes { 
            width: 100%; padding: 8px 10px; margin-bottom: 5px; background: #fff; border: 1px solid #eee; 
            border-left: 4px solid rgb(6, 94, 3); text-align: left; cursor: pointer; font-size: 0.7rem; 
            display: flex; justify-content: space-between; align-items: center; border-radius: 3px;
            transition: 0.2s;
        }
        .btRes strong { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 70%; }
        .btRes:hover { background: #f0f0f0; }
        .btRes.ativo { border-left-color: #ff8c00 !important; background: #fff5e6 !important; border-color: #ff8c00; font-weight: bold; }
        
        .estoque-status { font-size: 0.6rem; color: #666; font-weight: bold; }
        .estoque-baixo { color: #d93025; }

        /* Área Central e Mapas */
        .col-central { flex: 1; display: flex; flex-direction: column; background: #fff; position: relative; }
        .centro-topo { height: 35px; border-bottom: 1px solid #eee; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 0.85rem; background: #f9f9f9; color: #333; }
        
        .container-mapas { flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; }
        
        .caixa-troca { width: 100%; position: relative; transition: all 0.3s ease; display: flex; align-items: center; justify-content: center; }
        
        .pos-cima { height: 75%; z-index: 5; }
        .pos-baixo { 
            height: 25%; z-index: 10; cursor: pointer; background: #f4f4f4; 
            border-top: 2px solid #ccc; position: relative;
        }
        .pos-baixo:hover { background: #e8e8e8; }

        svg { width: 100%; height: 90%; display: block; }
        
        /* Cores e Interação dos Paths */
        path { stroke: #fff; stroke-width: 0.6; fill: #bbb; transition: 0.2s; }
        
        /* HOVER DIFERENCIADO */
        /* Cidades MRV (Verdes) -> Laranja forte */
        path.commrv { cursor: pointer; }
        path.commrv:hover { fill: #ff8c00 !important; stroke: #333; stroke-width: 1px; } 
        
        /* Cidades Cinzas -> Agora com destaque cinza claro/branco para maior contraste */
        path:not(.commrv):hover { fill: #f0f0f0; stroke: #888; stroke-width: 0.8px; } 
        
        .commrv { fill: rgb(6, 94, 3) !important; }
        .path-ativo { fill: #ff8c00 !important; stroke: #000; stroke-width: 1.5px; }
        
        /* Mapa de baixo: Garantimos que o clique passe para a DIV pai ou funcione no path */
        .pos-baixo svg { pointer-events: none; opacity: 0.6; }

        /* Ficha Técnica */
        .ficha-card { border: 1px solid #ddd; border-top: 4px solid #ff8c00; padding: 12px; border-radius: 4px; background: white; margin-top: 15px; }
        .ficha-nome { font-size: 0.95rem; color: #ff8c00; font-weight: bold; margin-bottom: 8px; display: block; }
        .item-info { font-size: 0.75rem; color: #333; margin-bottom: 8px; line-height: 1.3; }
        .item-info strong { font-size: 0.6rem; color: #888; text-transform: uppercase; display: block; }

        .btn-acao { width: 100%; padding: 10px; margin-top: 6px; border: none; border-radius: 4px; color: white; font-weight: bold; cursor: pointer; font-size: 0.7rem; }
        .btn-book { background: #065e03; }
        .btn-video { background: #ff8c00; }
    </style>
</head>
<body>

    <header><h1>Dashboard MRV - São Paulo</h1></header>

    <div class="main-wrapper">
        <aside class="col-lateral-esq" id="menu-residenciais">Carregando...</aside>
        
        <main class="col-central">
            <div class="centro-topo" id="display-nome">Selecione uma região</div>
            <div class="container-mapas" id="container-mapas">
                <div id="caixa-a" class="caixa-troca pos-cima"></div>
                <div id="caixa-b" class="caixa-troca pos-baixo" onclick="solicitarTroca()"></div>
            </div>
        </main>

        <aside class="col-lateral-dir" id="detalhes-residencial">
            <div style="text-align: center; color: #999; margin-top: 50px; font-size: 0.8rem;">Selecione um residencial.</div>
        </aside>
    </div>

    <script src="mrv-data.js"></script>
    <script>
        let pathSelecionado = null;
        let botaoSelecionado = null;
        let regiaoAtual = "gsp"; 
        let DADOS_PLANILHA = [];

        async function carregarPlanilha() {
            try {
                const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQzECvkefpM6aWy0IacqqI6l84_ti6zS1lSjcrgL0J4OcrtWZLb63sh7U1ZTQ4nsqDMeTU5ykl8xtDe/pub?output=csv";
                const response = await fetch(url);
                const texto = await response.text();
                const linhas = texto.split(/\r?\n/);
                
                DADOS_PLANILHA = linhas.slice(1).map(linha => {
                    let col = linha.split(/[,;]/).map(c => c.trim().replace(/^["']|["']$/g, ''));
                    
                    if (col.length < 4 || !col[2]) return null;
                    const n = col[2].toLowerCase();
                    // Filtro de "intrusos" da planilha
                    if (n.includes("lazer") || n.includes(".pdf") || n.includes("book") || 
                        n.includes("ids") || n === "btres" || n.includes("link")) return null;

                    return {
                        id_path: col[0], 
                        regiao: col[1] ? col[1].toLowerCase() : "", 
                        nome: col[2], 
                        estoque: parseInt(col[3]) || 0,
                        endereco: col[4], bairro: col[5], cidade: col[6],
                        entrega: col[7], preco: col[8], obra: col[11],
                        link_book: col[12]
                    };
                }).filter(item => item !== null);

                DADOS_PLANILHA.sort((a, b) => a.nome.localeCompare(b.nome));
                gerarListaLateral();
                desenharIniciais();
            } catch (e) { console.error("Erro na planilha:", e); }
        }

        function gerarListaLateral() {
            const menu = document.getElementById('menu-residenciais');
            menu.innerHTML = "";
            DADOS_PLANILHA.forEach(item => {
                const btn = document.createElement('button');
                btn.className = 'btRes';
                btn.id = `btn-esq-${item.nome.replace(/\s+/g, '-')}`;
                const statusTxt = item.estoque === 0 ? "Vendido" : `${item.estoque} un.`;
                btn.innerHTML = `<strong>${item.nome}</strong> <span class="estoque-status ${item.estoque <= 5 && item.estoque > 0 ? 'estoque-baixo' : ''}">${statusTxt}</span>`;
                btn.onclick = () => selecionarResidencial(item, btn);
                menu.appendChild(btn);
            });
        }

        function selecionarResidencial(item, btn) {
            if (botaoSelecionado) botaoSelecionado.classList.remove('ativo');
            
            const btnEsq = btn || document.getElementById(`btn-esq-${item.nome.replace(/\s+/g, '-')}`);
            if (btnEsq) {
                btnEsq.classList.add('ativo');
                btnEsq.scrollIntoView({ behavior: 'smooth', block: 'center' });
                botaoSelecionado = btnEsq;
            }

            if (item.regiao && item.regiao !== regiaoAtual) solicitarTroca();
            
            setTimeout(() => {
                const el = document.getElementById(item.id_path);
                if(el) destacarNoMapa(el);
                exibirFichaDireita(item);
            }, 100);
        }

        function exibirFichaDireita(item) {
            const painel = document.getElementById('detalhes-residencial');
            const vizinhos = DADOS_PLANILHA.filter(d => d.id_path === item.id_path && d.nome !== item.nome);
            
            let html = `<div style="font-size:0.7rem; font-weight:bold; color:rgb(6, 94, 3); margin-bottom:10px; border-bottom:1px solid #ddd; padding-bottom:5px;">TAMBÉM EM ${item.cidade.toUpperCase()}:</div>`;
            
            vizinhos.forEach(v => {
                html += `<button class="btRes" onclick='selecionarResidencial(${JSON.stringify(v)}, null)'>
                            <strong>${v.nome}</strong> <span class="estoque-status">${v.estoque} un.</span>
                         </button>`;
            });

            html += `
                <div class="ficha-card">
                    <span class="ficha-nome">${item.nome}</span>
                    <div class="item-info"><strong>📍 Localização</strong>${item.endereco}<br>${item.bairro} - ${item.cidade}</div>
                    <div class="item-info"><strong>💰 Valor Sugerido</strong>R$ ${item.preco || 'Sob consulta'}</div>
                    <div class="item-info"><strong>📅 Entrega / Obra</strong>${item.entrega} (${item.obra || '0%'} obra)</div>
                    <div class="item-info"><strong>📊 Estoque Atual</strong>${item.estoque} unidades</div>
                    
                    <button class="btn-acao btn-book" onclick="copiarLink('${item.link_book}', 'Book')">📄 Copiar Book do Cliente</button>
                    <button class="btn-acao btn-video">🎥 Copiar Vídeo 1</button>
                    <button class="btn-acao btn-video">🎥 Copiar Vídeo 2</button>
                </div>`;
            painel.innerHTML = html;
        }

        function copiarLink(link, tipo) {
            if(!link || link === 'undefined') { alert('Link não disponível.'); return; }
            navigator.clipboard.writeText(link).then(() => alert(tipo + ' copiado!'));
        }

        function destacarNoMapa(el) {
            if (pathSelecionado) pathSelecionado.classList.remove('path-ativo');
            el.classList.add('path-ativo');
            pathSelecionado = el;
            document.getElementById('display-nome').innerText = el.getAttribute('data-name');
        }

        function solicitarTroca() {
            regiaoAtual = (regiaoAtual === "gsp") ? "esp" : "gsp";
            const cA = document.getElementById('caixa-a'), cB = document.getElementById('caixa-b');
            const container = document.getElementById('container-mapas');
            
            // Troca física das divs para que a de cima sempre receba os eventos de path
            if (cA.classList.contains('pos-cima')) {
                cA.classList.replace('pos-cima', 'pos-baixo');
                cA.onclick = solicitarTroca; // Reatribui o clique de troca
                cB.classList.replace('pos-baixo', 'pos-cima');
                cB.onclick = null;
                container.appendChild(cA); 
            } else {
                cB.classList.replace('pos-cima', 'pos-baixo');
                cB.onclick = solicitarTroca;
                cA.classList.replace('pos-baixo', 'pos-cima');
                cA.onclick = null;
                container.appendChild(cB); 
            }
            if (pathSelecionado) pathSelecionado.classList.remove('path-ativo');
            pathSelecionado = null;
            document.getElementById('display-nome').innerText = "Selecione uma região";
        }

        function desenhar(idContainer, dados) {
            const container = document.getElementById(idContainer);
            const paths = dados.paths.map(p => {
                const temMRV = DADOS_PLANILHA.some(d => d.id_path === p.id);
                return `<path id="${p.id}" data-name="${p.name || p.id}" d="${p.d}" class="${p.class} ${temMRV ? 'commrv' : ''}"></path>`;
            }).join('');
            
            container.innerHTML = `<svg viewBox="${dados.viewBox}" preserveAspectRatio="xMidYMid meet"><g transform="${dados.transform}">${paths}</g></svg>`;
        }

        function desenharIniciais() {
            desenhar('caixa-a', MAPA_GSP);
            desenhar('caixa-b', MAPA_INTERIOR);
        }

        const containerMapas = document.getElementById('container-mapas');

        containerMapas.addEventListener('mouseover', (e) => {
            const p = e.target;
            if (p.tagName === 'path' && p.closest('.pos-cima')) {
                document.getElementById('display-nome').innerText = p.getAttribute('data-name');
            }
        });

        containerMapas.addEventListener('mouseleave', () => {
            document.getElementById('display-nome').innerText = pathSelecionado ? pathSelecionado.getAttribute('data-name') : "Selecione uma região";
        });

        containerMapas.addEventListener('click', (e) => {
            const p = e.target;
            if (p.tagName === 'path' && p.closest('.pos-cima')) {
                const item = DADOS_PLANILHA.find(d => d.id_path === p.id);
                if(item) selecionarResidencial(item, null);
                else destacarNoMapa(p);
            }
        });

        window.onload = carregarPlanilha;
    </script>
</body>
</html>
