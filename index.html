<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard MRV SP</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Residenciais MRV em SP</h1>
        <button class="btn-sobre" onclick="toggleModal(true)">Sobre</button>
    </header>

    <div id="modalSobre" class="modal-overlay">
        <div class="modal-box">
            <button class="btn-fechar-modal" onclick="toggleModal(false)">&times;</button>
            <p>Este dashboard auxilia no acesso a informações dos residenciais MRV em SP.</p>
            <p><strong>⚠️ Aviso:</strong> Informações podem estar desatualizadas.</p>
            <a href="https://wa.me/5511992617026" target="_blank" class="contato-link">Falar com Carlos</a>
        </div>
    </div>

    <div class="container-principal">
        <aside class="coluna" id="col-esquerda">
            <div class="titulo-coluna">Empreendimentos no Mapa</div>
            <div id="lista-geral-esquerda" class="conteudo-scroll">
                </div>
        </aside>

        <main class="coluna-mapa">
            <div id="nome-regiao" class="display-cidade">Toque em uma região</div>
            
            <div id="mapa-container">
                <div id="container-gsp" class="caixa-mapa caixa-maximizada" onclick="trocarMapas(this)">
                    <svg viewBox="80 -10 490 310" id="svg-gsp">
                        <g transform="translate(110.74, 10) scale(0.2645)">
                            </g>
                    </svg>
                </div>

                <div id="container-esp" class="caixa-mapa caixa-minimizada" onclick="trocarMapas(this)">
                    <svg viewBox="540 -10 520 310" id="svg-esp">
                        <g transform="translate(592.4, 0) scale(0.2645)">
                            </g>
                    </svg>
                </div>
            </div>
        </main>

        <aside class="coluna" id="col-direita">
            <div class="titulo-coluna">Ficha Técnica</div>
            <div id="painel-info" class="conteudo-scroll">
                <h2 id="titulo-dinamico"></h2>
                <div id="btRes-container"></div>
                <div id="dica-corretor-box"></div>
                <div id="obs-box"></div>
                <div id="residencial-info"></div>
            </div>
        </aside>
    </div>

    <script src="script.js"></script>
</body>
</html>
