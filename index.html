<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard MRV SP</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body, html { height: 100vh; overflow: hidden; background: #fff; }
        header { background: rgb(6, 94, 3); height: 50px; display: flex; align-items: center; justify-content: center; color: white; z-index: 10; position: relative; }
        .main-wrapper { display: flex; height: calc(100% - 50px); width: 100%; }

        /* Colunas */
        .col-lateral-esq { width: 20%; border-right: 1px solid #ccc; background: #fdfdfd; overflow-y: auto; padding: 5px; }
        .col-central { flex: 1; display: flex; flex-direction: column; position: relative; }
        .col-lateral-dir { width: 33%; border-left: 1px solid #ccc; background: #fdfdfd; padding: 15px; overflow-y: auto; }

        /* Botões da Esquerda */
        .btRes { 
            width: 100%; padding: 8px 10px; margin-bottom: 3px; background: #fff; border: 1px solid #ddd; 
            border-left: 5px solid rgb(6, 94, 3); text-align: left; cursor: pointer; font-size: 0.7rem; 
            border-radius: 4px; display: flex; justify-content: space-between; align-items: center;
        }
        .btRes:hover { background: #f0f0f0; border-left-color: #ff8c00; }
        .btRes.ativo { background: #fff5e6 !important; border-color: #ff8c00 !important; border-left-color: #ff8c00 !important; font-weight: bold; }
        
        /* Status de Estoque */
        .estoque-status { font-size: 0.65rem; font-weight: bold; color: #666; white-space: nowrap; }
        .estoque-baixo { color: #d93025 !important; } 
        .estoque-vendido { text-decoration: line-through; color: #999 !important; }

        /* Título Vizinhos */
        .titulo-vizinhos { font-size: 0.8rem; font-weight: bold; color: rgb(6, 94, 3); margin-bottom: 12px; padding-bottom: 5px; border-bottom: 1px solid #ddd; text-transform: uppercase; }

        /* --- Ficha Técnica Estilo Dashboard Vendas --- */
        .detalhe-card { margin-top: 25px; }
        
        .box-dica { 
            background: #f1f9f1; border-left: 4px solid #388e3c; padding: 10px; 
            font-size: 0.8rem; margin-bottom: 15px; border-radius: 0 4px 4px 0; color: #2e7d32;
        }

        .ficha-conteudo { 
            border: 1px solid #eee; border-left: 4px solid #ff8c00; padding: 15px; 
            border-radius: 4px; background: white; box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .titulo-ficha-principal { font-size: 1.1rem; color: #004d00; font-weight: bold; margin-bottom: 10px; display: block; }
        
        .grid-info { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; border-top: 1px solid #eee; padding-top: 10px; }
        
        .item-info { font-size: 0.82rem; color: #444; line-height: 1.4; }
        .item-info strong { display: block; font-size: 0.7rem; color: #888; text-transform: uppercase; margin-bottom: 2px; }

        .full-info { margin-top: 12px; font-size: 0.82rem; color: #444; border-top: 1px solid #eee; padding-top: 10px; }

        /* Botões de Ação */
        .btn-acao { 
            width: 100%; padding: 10px; margin-top: 8px; border: none; border-radius: 5px; 
            color: white; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 0.85rem;
        }
        .btn-book { background: #065e03; }
        .btn-video { background: #ff8c00; }
        .btn-acao:hover { opacity: 0.9; }

        /* Mapa e Layout Central */
        .centro-topo { height: 45px; border-bottom: 1px solid #ccc; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        .container-mapas { flex: 1; display: flex; flex-direction: column; position: relative; overflow: hidden; }
        .caixa-troca { width: 100%; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .pos-cima { height: 80%; background: white; }
        .pos-baixo { height: 20%; background: #fff; cursor: pointer; border-top: 2px solid #ddd; opacity: 0.8; }
        svg { max-width: 95%; max-height: 95%; transform: scale(1.1); }
        path { stroke: #fff; stroke-width: 0.5; fill: #8c8c8c; transition: 0.2s; }
        .commrv, #grandesaopaulo { fill: rgb(6, 94, 3) !important; cursor: pointer !important; }
        .path-ativo { fill: #ff8c00 !important; stroke: #000; stroke-width: 1px; }
    </style>
</head>
<body>

    <header><h1>Dashboard MRV - São Paulo</h1></header>

    <div class="main-wrapper">
        <aside class="col-lateral-esq" id="menu-residenciais">Carregando...</aside>
        
        <main class="col-central">
            <div class="centro-topo" id="display-nome">Selecione uma região</div>
            <div class="container-mapas" id="container-mapas">
                <div id="caixa-a" class="caixa-troca pos-cima"></div>
                <div id="caixa-b" class="caixa-troca pos-baixo" onclick="solicitarTroca()"></div>
            </div>
        </main>

        <aside class="col-lateral-dir" id="detalhes-residencial">
            <div style="text-align: center; color: #999; margin-top: 50px;">
                <p>Selecione um residencial para ver os detalhes.</p>
            </div>
        </aside>
    </div>

    <script src="mrv-data.js"></script>

    <script>
        let pathSelecionado = null;
        let botaoSelecionado = null;
        let regiaoAtual = "gsp"; 
        let DADOS_PLANILHA = [];

        const LINK_CSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQzECvkefpM6aWy0IacqqI6l84_ti6zS1lSjcrgL0J4OcrtWZLb63sh7U1ZTQ4nsqDMeTU5ykl8xtDe/pub?output=csv";

        async function carregarPlanilha() {
            try {
                const response = await fetch(LINK_CSV);
                const texto = await response.text();
                const linhas = texto.split(/\r?\n/);

                DADOS_PLANILHA = linhas.slice(1).map(linha => {
                    let col = linha.split(/[,;]/).map(c => c.trim().replace(/^["']|["']$/g, ''));
                    if (col.length < 3 || col[0].includes('http')) return null;
                    return {
                        id_path: col[0],
                        regiao: col[1] ? col[1].toLowerCase() : "",
                        nome: col[2],
                        estoque: parseInt(col[3]) || 0,
                        endereco: col[4],
                        bairro: col[5],
                        cidade: col[6],
                        entrega: col[7],
                        preco: col[8],
                        plantas: col[9], // Coluna J (ajustado conforme padrão comum)
                        obra: col[11],
                        book: col[13],   // Coluna N
                        dica: col[14],   // Coluna O
                        video1: col[15], // Coluna P
                        video2: col[16], // Coluna Q
                        obs: col[12]     // Coluna M
                    };
                }).filter(item => item !== null);

                DADOS_PLANILHA.sort((a, b) => a.nome.localeCompare(b.nome));
                gerarListaGeral();
            } catch (e) {
                document.getElementById('menu-residenciais').innerText = "Erro ao carregar dados.";
            }
        }

        function formatarEstoqueBotao(qtd) {
            if (qtd === 0) return `<span class="estoque-status estoque-vendido">VENDIDO</span>`;
            if (qtd <= 5) return `<span class="estoque-status estoque-baixo">restam ${qtd} unidades</span>`;
            return `<span class="estoque-status">${qtd} unidades</span>`;
        }

        function gerarListaGeral() {
            const menu = document.getElementById('menu-residenciais');
            menu.innerHTML = "";
            DADOS_PLANILHA.forEach(item => {
                const btn = document.createElement('button');
                btn.className = 'btRes';
                btn.innerHTML = `<strong>${item.nome}</strong> ${formatarEstoqueBotao(item.estoque)}`;
                btn.onclick = () => clicarNoBotao(btn, item);
                menu.appendChild(btn);
            });
        }

        function clicarNoBotao(btn, item) {
            if (botaoSelecionado) botaoSelecionado.classList.remove('ativo');
            btn.classList.add('ativo');
            botaoSelecionado = btn;
            if (item.regiao !== regiaoAtual) solicitarTroca();
            setTimeout(() => {
                const el = document.getElementById(item.id_path);
                if(el) destacarNoMapa(el);
                exibirPainelDireito(item, el ? el.getAttribute('data-name') : item.cidade);
            }, 100);
        }

        function exibirPainelDireito(item, nomeCidade) {
            const painel = document.getElementById('detalhes-residencial');
            let html = `<div class="titulo-vizinhos">Também em ${nomeCidade || 'esta região'}:</div>`;

            const vizinhos = DADOS_PLANILHA.filter(d => d.id_path === item.id_path && d.nome !== item.nome);
            vizinhos.forEach(v => {
                html += `<button class="btRes" onclick="processarCliqueExterno('${v.nome}')">
                            <strong>${v.nome}</strong> ${formatarEstoqueBotao(v.estoque)}
                         </button>`;
            });

            // Card Principal
            html += `<div class="detalhe-card">`;

            // Dica (se houver)
            if (item.dica && item.dica !== "---") {
                html += `<div class="box-dica">💡 <strong>Dica:</strong> ${item.dica}</div>`;
            }

            // Ficha Técnica Estilizada
            html += `
                <div class="ficha-conteudo">
                    <span class="titulo-ficha-principal">${item.nome} - ${formatarEstoqueBotao(item.estoque)}</span>
                    <div class="item-info">📍 <strong>Localização</strong> ${item.endereco || ''}, ${item.bairro || ''}</div>
                    
                    <div class="grid-info">
                        <div class="item-info">💰 <strong>Preço</strong> R$ ${item.preco || 'Sob consulta'}</div>
                        <div class="item-info">🔑 <strong>Entrega</strong> ${item.entrega || '---'}</div>
                        <div class="item-info">📐 <strong>Plantas</strong> ${item.plantas || 'Consulte'}</div>
                        <div class="item-info">🏗️ <strong>Obra</strong> ${item.obra || '0%'}</div>
                    </div>

                    ${item.obs && item.obs !== "---" ? `<div class="full-info">📝 <strong>Obs</strong> ${item.obs}</div>` : ''}
                </div>`;

            // Botões de Ação (Apenas se houver links)
            if (item.book) html += `<button class="btn-acao btn-book" onclick="window.open('${item.book}')">📄 Copiar Book do Cliente</button>`;
            if (item.video1) html += `<button class="btn-acao btn-video" onclick="window.open('${item.video1}')">🎬 Copiar Vídeo 1</button>`;
            if (item.video2) html += `<button class="btn-acao btn-video" onclick="window.open('${item.video2}')">🎬 Copiar Vídeo 2</button>`;

            html += `</div>`;
            painel.innerHTML = html;
        }

        function processarCliqueExterno(nomeResidencial) {
            const bts = document.querySelectorAll('.col-lateral-esq .btRes');
            bts.forEach(b => {
                if (b.innerText.includes(nomeResidencial.toUpperCase())) { b.click(); b.scrollIntoView({ behavior: 'smooth', block: 'nearest' }); }
            });
        }

        function destacarNoMapa(el) {
            if (pathSelecionado) pathSelecionado.classList.remove('path-ativo');
            el.classList.add('path-ativo');
            pathSelecionado = el;
            document.getElementById('display-nome').innerText = el.getAttribute('data-name');
        }

        function desenhar(idContainer, dados) {
            const container = document.getElementById(idContainer);
            const paths = dados.paths.map(p => `<path id="${p.id}" data-name="${p.name || p.id}" d="${p.d}" class="${p.class}"></path>`).join('');
            container.innerHTML = `<svg viewBox="${dados.viewBox}"><g transform="${dados.transform}">${paths}</g></svg>`;
            vincularEventos();
        }

        function vincularEventos() {
            const paths = document.querySelectorAll('.pos-cima path');
            paths.forEach(p => {
                p.onclick = (e) => {
                    e.stopPropagation();
                    if (p.id === "grandesaopaulo") { solicitarTroca(); return; }
                    if (!p.classList.contains('commrv')) return;
                    const item = DADOS_PLANILHA.find(d => d.id_path === p.id);
                    if(item) processarCliqueExterno(item.nome);
                };
            });
        }

        function solicitarTroca() {
            regiaoAtual = (regiaoAtual === "gsp") ? "esp" : "gsp";
            const cA = document.getElementById('caixa-a'), cB = document.getElementById('caixa-b'), container = document.getElementById('container-mapas');
            if (pathSelecionado) pathSelecionado.classList.remove('path-ativo');
            pathSelecionado = null;
            if (cB.classList.contains('pos-baixo')) { cB.classList.replace('pos-baixo', 'pos-cima'); cA.classList.replace('pos-cima', 'pos-baixo'); container.insertBefore(cB, cA); }
            else { cA.classList.replace('pos-baixo', 'pos-cima'); cB.classList.replace('pos-cima', 'pos-baixo'); container.insertBefore(cA, cB); }
            vincularEventos();
        }

        window.onload = () => { desenhar('caixa-a', MAPA_GSP); desenhar('caixa-b', MAPA_INTERIOR); carregarPlanilha(); };
    </script>
</body>
</html>
