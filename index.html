<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard MRV SP - Estabilizado</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body, html { height: 100vh; overflow: hidden; background: #fff; }
        
        header { 
            background: rgb(6, 94, 3); height: 50px; display: flex; 
            align-items: center; justify-content: center; color: white; 
            z-index: 100; position: relative; 
        }
        
        .main-wrapper { display: flex; height: calc(100% - 50px); width: 100%; }

        /* Coluna Esquerda */
        .col-lateral-esq { width: 25%; border-right: 1px solid #ccc; background: #fdfdfd; overflow-y: auto; padding: 8px; }

        /* Botões btRes - REGRA DE LINHA ÚNICA */
        .btRes { 
            width: 100%; padding: 8px 12px; margin-bottom: 5px; background: #fff; border: 1px solid #ddd; 
            border-left: 5px solid rgb(6, 94, 3); text-align: left; cursor: pointer; font-size: 0.75rem; 
            border-radius: 4px; display: flex; justify-content: space-between; align-items: center;
            transition: 0.2s;
        }
        .btRes strong { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 65%; text-transform: uppercase; }
        .btRes:hover { background: #f0f0f0; border-left-color: #ff8c00; }
        .btRes.ativo { border-left-color: #ff8c00 !important; background: #fff5e6 !important; font-weight: bold; border-color: #ff8c00; }
        
        /* Status de Estoque */
        .estoque-status { font-size: 0.65rem; font-weight: bold; color: #666; white-space: nowrap; margin-left: 5px; }
        .estoque-baixo { color: #d93025 !important; }
        .estoque-vendido { text-decoration: line-through; color: #999 !important; text-transform: uppercase; }

        /* Coluna Central e Mapas */
        .col-central { flex: 1; display: flex; flex-direction: column; background: #fff; overflow: hidden; border-right: 1px solid #ccc; }
        .centro-topo { height: 45px; border-bottom: 1px solid #eee; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        
        .container-mapas { flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; }
        
        /* FIX DO MAPA: O segredo para não vazar é o container relativo e o svg absoluto */
        .caixa-troca { width: 100%; position: relative; overflow: hidden; transition: 0.3s; background: white; }
        .pos-cima { height: 75%; z-index: 2; }
        .pos-baixo { height: 25%; z-index: 5; cursor: pointer; background: #f9f9f9; border-top: 2px solid #ddd; }
        .pos-baixo:hover { background: #eee; }
        .pos-baixo svg { opacity: 0.6; pointer-events: none; }

        svg { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 90%; height: 90%; max-width: 100%; max-height: 100%; display: block;
        }
        
        path { stroke: #fff; stroke-width: 0.5; fill: #ccc; transition: 0.2s; cursor: pointer; }
        .commrv, #grandesaopaulo { fill: rgb(6, 94, 3) !important; }
        .path-ativo { fill: #ff8c00 !important; stroke: #000; stroke-width: 1.5px; }

        /* Coluna Direita */
        .col-lateral-dir { width: 25%; background: #fdfdfd; padding: 15px; overflow-y: auto; }
        .titulo-vizinhos { font-size: 0.75rem; font-weight: bold; color: rgb(6, 94, 3); margin-bottom: 10px; border-bottom: 1px solid #ddd; padding-bottom: 3px; text-transform: uppercase; }
        .ficha-card { border: 1px solid #eee; border-left: 5px solid #ff8c00; padding: 12px; border-radius: 4px; background: white; margin-top: 15px; }
        .ficha-nome { font-size: 0.95rem; color: #065e03; font-weight: bold; margin-bottom: 8px; display: block; }
        .item-info { font-size: 0.75rem; color: #333; margin-bottom: 5px; }
        .item-info strong { font-size: 0.65rem; color: #999; text-transform: uppercase; display: block; }
    </style>
</head>
<body>

    <header><h1>Dashboard MRV - São Paulo</h1></header>

    <div class="main-wrapper">
        <aside class="col-lateral-esq" id="menu-residenciais">Carregando lista...</aside>
        
        <main class="col-central">
            <div class="centro-topo" id="display-nome">Selecione uma região</div>
            <div class="container-mapas" id="container-mapas">
                <div id="caixa-a" class="caixa-troca pos-cima"></div>
                <div id="caixa-b" class="caixa-troca pos-baixo" onclick="trocarMapas()"></div>
            </div>
        </main>

        <aside class="col-lateral-dir" id="detalhes-residencial">
            <div style="text-align: center; color: #999; margin-top: 50px;">Aguardando seleção...</div>
        </aside>
    </div>

    <script src="mrv-data.js"></script>
    <script>
        let pathSelecionado = null;
        let botaoSelecionado = null;
        let regiaoAtual = "gsp"; 
        let DADOS_PLANILHA = [];

        async function carregarPlanilha() {
            try {
                const response = await fetch("https://docs.google.com/spreadsheets/d/e/2PACX-1vQzECvkefpM6aWy0IacqqI6l84_ti6zS1lSjcrgL0J4OcrtWZLb63sh7U1ZTQ4nsqDMeTU5ykl8xtDe/pub?output=csv");
                const texto = await response.text();
                const linhas = texto.split(/\r?\n/);
                
                DADOS_PLANILHA = linhas.slice(1).map(linha => {
                    let col = linha.split(/[,;]/).map(c => c.trim().replace(/^["']|["']$/g, ''));
                    
                    // FILTRO DE INTRUSOS: Ignora cabeçalhos, pdfs, lazer e linhas vazias
                    if (col.length < 4 || !col[2] || col[2].toLowerCase().includes("pdf") || 
                        col[2].toLowerCase().includes("lazer") || col[0].includes("IDs") || col[2] === "btRes") return null;

                    return {
                        id_path: col[0], 
                        regiao: col[1] ? col[1].toLowerCase() : "", 
                        nome: col[2],
                        estoque: parseInt(col[3]) || 0,
                        endereco: col[4], bairro: col[5], cidade: col[6],
                        entrega: col[7], preco: col[8], obra: col[11]
                    };
                }).filter(item => item !== null);

                DADOS_PLANILHA.sort((a, b) => a.nome.localeCompare(b.nome));
                gerarListaGeral();
            } catch (e) { console.error("Erro ao carregar:", e); }
        }

        function formatarEstoqueHTML(qtd) {
            if (qtd === 0) return `<span class="estoque-status estoque-vendido">Vendido</span>`;
            if (qtd <= 5) return `<span class="estoque-status estoque-baixo">restam ${qtd} un.</span>`;
            return `<span class="estoque-status">${qtd} unidades</span>`;
        }

        function gerarListaGeral() {
            const menu = document.getElementById('menu-residenciais');
            menu.innerHTML = "";
            DADOS_PLANILHA.forEach(item => {
                const btn = document.createElement('button');
                btn.className = 'btRes';
                btn.innerHTML = `<strong>${item.nome}</strong> ${formatarEstoqueHTML(item.estoque)}`;
                btn.onclick = () => selecionarResidencial(item, btn);
                menu.appendChild(btn);
            });
        }

        function selecionarResidencial(item, btn) {
            // Sincronizar botão da esquerda
            if (!btn) {
                const bts = document.querySelectorAll('.col-lateral-esq .btRes');
                btn = Array.from(bts).find(b => b.innerText.includes(item.nome.toUpperCase()));
            }
            if (botaoSelecionado) botaoSelecionado.classList.remove('ativo');
            if (btn) { 
                btn.classList.add('ativo'); 
                btn.scrollIntoView({ behavior: 'smooth', block: 'nearest' }); 
                botaoSelecionado = btn; 
            }

            // Troca de mapa se necessário
            if (item.regiao !== regiaoAtual) trocarMapas();
            
            // Destacar no mapa e exibir painel
            setTimeout(() => {
                const el = document.querySelector('.pos-cima #' + item.id_path);
                if(el) destacarNoMapa(el);
                exibirPainelDireito(item, el ? el.getAttribute('data-name') : item.cidade);
            }, 150);
        }

        function exibirPainelDireito(item, nomeCidade) {
            const painel = document.getElementById('detalhes-residencial');
            let html = `<div class="titulo-vizinhos">Também em ${nomeCidade || 'esta região'}:</div>`;
            
            const vizinhos = DADOS_PLANILHA.filter(d => d.id_path === item.id_path && d.nome !== item.nome);
            vizinhos.forEach(v => {
                html += `<button class="btRes" onclick='selecionarResidencial(${JSON.stringify(v)}, null)'>
                            <strong>${v.nome}</strong> ${formatarEstoqueHTML(v.estoque)}
                         </button>`;
            });

            html += `
                <div class="ficha-card">
                    <span class="ficha-nome">${item.nome}</span>
                    <div class="item-info"><strong>Localização</strong> ${item.endereco || ''} - ${item.bairro || ''}</div>
                    <div class="item-info"><strong>Preço Sugerido</strong> R$ ${item.preco || 'Sob consulta'}</div>
                    <div class="item-info"><strong>Entrega</strong> ${item.entrega || '---'}</div>
                    <div class="item-info"><strong>Obra</strong> ${item.obra || '0%'}</div>
                    <div class="item-info"><strong>Estoque</strong> ${item.estoque} unidades</div>
                </div>`;
            painel.innerHTML = html;
        }

        function destacarNoMapa(el) {
            if (pathSelecionado) pathSelecionado.classList.remove('path-ativo');
            el.classList.add('path-ativo');
            pathSelecionado = el;
            document.getElementById('display-nome').innerText = el.getAttribute('data-name');
        }

        function trocarMapas() {
            regiaoAtual = (regiaoAtual === "gsp") ? "esp" : "gsp";
            const cA = document.getElementById('caixa-a'), cB = document.getElementById('caixa-b');
            const container = document.getElementById('container-mapas');

            if (cA.classList.contains('pos-cima')) {
                cA.classList.replace('pos-cima', 'pos-baixo'); cA.onclick = trocarMapas;
                cB.classList.replace('pos-baixo', 'pos-cima'); cB.onclick = null;
                container.appendChild(cA); // Manda A para baixo
            } else {
                cB.classList.replace('pos-cima', 'pos-baixo'); cB.onclick = trocarMapas;
                cA.classList.replace('pos-baixo', 'pos-cima'); cA.onclick = null;
                container.appendChild(cB); // Manda B para baixo
            }
            if (pathSelecionado) pathSelecionado.classList.remove('path-ativo');
            pathSelecionado = null;
            document.getElementById('display-nome').innerText = "Selecione uma região";
        }

        function desenhar(idContainer, dados) {
            const container = document.getElementById(idContainer);
            const paths = dados.paths.map(p => `<path id="${p.id}" data-name="${p.name || p.id}" d="${p.d}" class="${p.class}"></path>`).join('');
            container.innerHTML = `<svg viewBox="${dados.viewBox}" preserveAspectRatio="xMidYMid meet">${paths}</svg>`;
        }

        // Delegação de evento para cliques nos caminhos do mapa
        document.getElementById('container-mapas').addEventListener('click', (e) => {
            const p = e.target;
            if (p.tagName !== 'path' || p.closest('.pos-baixo')) return;
            
            if (p.id === "grandesaopaulo") { trocarMapas(); } 
            else if (p.classList.contains('commrv')) {
                const item = DADOS_PLANILHA.find(d => d.id_path === p.id);
                if(item) selecionarResidencial(item, null);
            }
        });

        window.onload = () => { 
            desenhar('caixa-a', MAPA_GSP); 
            desenhar('caixa-b', MAPA_INTERIOR); 
            carregarPlanilha(); 
        };
    </script>
</body>
</html>
