<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard MRV - Carregamento de Mapas</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body, html { height: 100%; overflow: hidden; }
        
        header { background: rgb(6, 94, 3); height: 50px; display: flex; align-items: center; justify-content: center; color: white; position: relative; }
        .btn-sobre { position: absolute; right: 20px; background: none; border: 1px solid white; color: white; padding: 5px 10px; cursor: pointer; }

        .main-wrapper { display: flex; height: calc(100% - 50px); width: 100%; }
        .col-esquerda { width: calc(100% * 2 / 9); border: 1px solid #ccc; }
        .col-direita { width: calc(100% * 3 / 9); border: 1px solid #ccc; }
        .col-central { flex: 1; display: flex; flex-direction: column; }
        
        .centro-topo { height: 50px; border: 1px solid #ccc; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        .container-mapas { flex: 1; display: flex; flex-direction: column; }
        
        /* Caixas de Troca */
        .caixa-troca { width: 100%; border: 1px solid #ccc; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .pos-cima { height: 75%; background: white; }
        .pos-baixo { height: 25%; background: #ffff00; cursor: pointer; }

        /* Estilo base dos SVGs para preencherem a caixa */
        svg { width: 100%; height: 100%; display: block; }
        path { fill: #333; stroke: #fff; stroke-width: 0.5; } /* Cor temporária para teste */
    </style>
</head>
<body>

    <header>
        <h1>Residenciais MRV em SP</h1>
        <button class="btn-sobre">Sobre</button>
    </header>

    <div class="main-wrapper">
        <aside class="col-esquerda"></aside>
        <main class="col-central">
            <div class="centro-topo" id="display-nome">MAPA CARREGADO</div>
            <div class="container-mapas" id="container-mapas">
                <div id="caixa-a" class="caixa-troca pos-cima"></div>
                <div id="caixa-b" class="caixa-troca pos-baixo" onclick="executarTroca(this)"></div>
            </div>
        </main>
        <aside class="col-direita"></aside>
    </div>

    <script src="mrv-data.js"></script>

    <script>
        // Função que pega os dados da biblioteca e desenha o SVG
        function renderizarMapaNoContainer(idContainer, dadosMapa) {
            const container = document.getElementById(idContainer);
            if (!dadosMapa || !dadosMapa.paths) {
                container.innerHTML = "Erro: Dados do mapa não encontrados.";
                return;
            }

            // Gera a string de todos os paths
            const htmlPaths = dadosMapa.paths.map(p => 
                `<path id="${p.id}" d="${p.d}" class="${p.class || ''}"></path>`
            ).join('');

            // Monta o SVG completo
            container.innerHTML = `
                <svg viewBox="${dadosMapa.viewBox}" preserveAspectRatio="xMidYMid meet">
                    <g transform="${dadosMapa.transform}">
                        ${htmlPaths}
                    </g>
                </svg>
            `;
        }

        // Lógica de Troca (Simplificada para teste)
        function executarTroca(elemento) {
            if (elemento.classList.contains('pos-cima')) return;
            
            const container = document.getElementById('container-mapas');
            const a = document.getElementById('caixa-a');
            const b = document.getElementById('caixa-b');

            if (b.classList.contains('pos-baixo')) {
                b.classList.replace('pos-baixo', 'pos-cima');
                a.classList.replace('pos-cima', 'pos-baixo');
                container.insertBefore(b, a);
            } else {
                a.classList.replace('pos-baixo', 'pos-cima');
                b.classList.replace('pos-cima', 'pos-baixo');
                container.insertBefore(a, b);
            }
        }

        // Inicializa os mapas ao carregar a página
        window.onload = () => {
            renderizarMapaNoContainer('caixa-a', MAPA_GSP);
            renderizarMapaNoContainer('caixa-b', MAPA_INTERIOR);
        };
    </script>
</body>
</html>
