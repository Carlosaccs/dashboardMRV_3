<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard MRV SP</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        
        body, html { height: 100vh; overflow: hidden; background: #fff; }
        
        header { background: rgb(6, 94, 3); height: 50px; display: flex; align-items: center; justify-content: center; color: white; position: relative; z-index: 10; }

        .main-wrapper { display: flex; height: calc(100% - 50px); width: 100%; }

        .col-lateral-esq { width: 20%; border-right: 1px solid #ccc; background: #fdfdfd; }
        .col-lateral-dir { width: 28%; border-left: 1px solid #ccc; background: #fdfdfd; }
        .col-central { flex: 1; display: flex; flex-direction: column; height: 100%; }
        
        .centro-topo { 
            height: 45px; 
            border-bottom: 1px solid #ccc; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-weight: bold; 
            min-height: 45px;
        }

        .container-mapas { flex: 1; display: flex; flex-direction: column; height: calc(100% - 45px); }
        .caixa-troca { width: 100%; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .pos-cima { height: 80%; background: white; padding: 5px; }
        .pos-baixo { height: 20%; background: #ffffff; cursor: pointer; padding: 5px; border-top: 2px solid #ddd; }

        .pos-cima svg { max-width: 100%; max-height: 100%; transform: scale(1.15); }
        .pos-baixo svg { max-width: 100%; max-height: 100%; transform: scale(1.4); }

        /* --- ESTILOS DOS PATHS --- */
        path { stroke: #fff; stroke-width: 0.5; transition: 0.2s; fill: #8c8c8c; }
        .commrv { fill: rgb(6, 94, 3) !important; cursor: pointer; }
        .semmrv { fill: #8c8c8c; pointer-events: none; } /* Bloqueia interação em cidades cinzas */

        /* --- HOVER E ATIVO (LARANJA) --- */
        /* Só funciona em quem for .commrv e estiver na caixa de cima */
        .pos-cima .commrv:hover { 
            fill: #ff8c00 !important; /* Laranja */
        }

        /* Classe que será aplicada via JavaScript ao clicar */
        .path-ativo { 
            fill: #ff8c00 !important; 
            stroke: #000; 
            stroke-width: 1px;
        }

        .pos-baixo path { pointer-events: none; }
    </style>
</head>
<body>

    <header><h1>Residenciais MRV em SP</h1></header>

    <div class="main-wrapper">
        <aside class="col-lateral-esq"></aside>
        
        <main class="col-central">
            <div class="centro-topo" id="display-nome"></div>
            <div class="container-mapas" id="container-mapas">
                <div id="caixa-a" class="caixa-troca pos-cima"></div>
                <div id="caixa-b" class="caixa-troca pos-baixo" onclick="solicitarTroca()"></div>
            </div>
        </main>

        <aside class="col-lateral-dir"></aside>
    </div>

    <script src="mrv-data.js"></script>

    <script>
        let pathSelecionado = null; // Guarda qual cidade está clicada

        function desenhar(idContainer, dados) {
            const container = document.getElementById(idContainer);
            if (!dados) return;
            
            const paths = dados.paths.map(p => 
                `<path id="${p.id}" data-name="${p.name || p.id}" d="${p.d}" class="${p.class}"></path>`
            ).join('');
            
            container.innerHTML = `<svg viewBox="${dados.viewBox}" preserveAspectRatio="xMidYMid meet"><g transform="${dados.transform}">${paths}</g></svg>`;
            vincularEventos();
        }

        function vincularEventos() {
            const caixaCima = document.querySelector('.pos-cima');
            const display = document.getElementById('display-nome');
            const paths = caixaCima.querySelectorAll('.commrv'); // Apenas cidades verdes
            
            paths.forEach(p => {
                // Evento de Hover (Passar o mouse)
                p.onmouseover = () => {
                    display.innerText = p.getAttribute('data-name');
                    display.style.color = "rgb(6, 94, 3)";
                };

                // Evento de Sair (Mouse out)
                p.onmouseout = () => {
                    // Se houver alguém selecionado, mantém o nome dele, senão limpa
                    display.innerText = pathSelecionado ? pathSelecionado.getAttribute('data-name') : "";
                };

                // Evento de Clique (Selecionar)
                p.onclick = (e) => {
                    e.stopPropagation(); // Impede conflitos de clique

                    // Se clicar na mesma que já está ativa, desativa
                    if (pathSelecionado === p) {
                        p.classList.remove('path-ativo');
                        pathSelecionado = null;
                        display.innerText = "";
                    } else {
                        // Remove ativo da anterior
                        if (pathSelecionado) pathSelecionado.classList.remove('path-ativo');
                        
                        // Ativa a nova
                        p.classList.add('path-ativo');
                        pathSelecionado = p;
                        display.innerText = p.getAttribute('data-name');
                    }
                };
            });
        }

        function solicitarTroca() {
            const caixaA = document.getElementById('caixa-a');
            const caixaB = document.getElementById('caixa-b');
            const container = document.getElementById('container-mapas');
            const display = document.getElementById('display-nome');

            // Reseta a seleção ao trocar de mapa
            if (pathSelecionado) pathSelecionado.classList.remove('path-ativo');
            pathSelecionado = null;
            display.innerText = "";

            if (caixaB.classList.contains('pos-baixo')) {
                caixaB.classList.replace('pos-baixo', 'pos-cima');
                caixaA.classList.replace('pos-cima', 'pos-baixo');
                container.insertBefore(caixaB, caixaA);
                caixaB.onclick = null;
                caixaA.onclick = solicitarTroca;
            } else {
                caixaA.classList.replace('pos-baixo', 'pos-cima');
                caixaB.classList.replace('pos-cima', 'pos-baixo');
                container.insertBefore(caixaA, caixaB);
                caixaA.onclick = null;
                caixaB.onclick = solicitarTroca;
            }
            vincularEventos();
        }

        window.onload = () => {
            desenhar('caixa-a', MAPA_GSP);
            desenhar('caixa-b', MAPA_INTERIOR);
        };
    </script>
</body>
</html>
