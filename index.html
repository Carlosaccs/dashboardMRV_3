<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard MRV SP</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body, html { height: 100vh; overflow: hidden; background: #fff; }
        header { background: rgb(6, 94, 3); height: 50px; display: flex; align-items: center; justify-content: center; color: white; z-index: 10; position: relative; }
        .main-wrapper { display: flex; height: calc(100% - 50px); width: 100%; }

        /* Coluna Esquerda */
        .col-lateral-esq { width: 25%; border-right: 1px solid #ccc; background: #fdfdfd; overflow-y: auto; padding: 5px; }
        
        .btRes { 
            width: 100%; 
            padding: 6px 10px; 
            margin-bottom: 3px; 
            background: #fff; 
            border: 1px solid #ddd; 
            border-left: 5px solid rgb(6, 94, 3); 
            text-align: left; 
            cursor: pointer; 
            font-size: 0.72rem; 
            border-radius: 4px; 
            transition: 0.1s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .btRes:hover { background: #f0f0f0; border-left-color: #ff8c00; }
        .btRes.ativo { background: #fff5e6 !important; border-color: #ff8c00 !important; border-left-color: #ff8c00 !important; font-weight: bold; }
        
        /* Estilos do Texto de Estoque no Botão */
        .estoque-status { font-size: 0.65rem; font-weight: bold; color: #666; margin-left: 10px; white-space: nowrap; }
        .estoque-baixo { color: #d93025 !important; } /* Vermelho para <= 5 */
        .estoque-vendido { text-decoration: line-through; color: #999 !important; } /* Tachado para 0 */

        /* Coluna Central */
        .col-central { flex: 1; display: flex; flex-direction: column; position: relative; }
        .centro-topo { height: 45px; border-bottom: 1px solid #ccc; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 1.1rem; }
        .container-mapas { flex: 1; display: flex; flex-direction: column; position: relative; overflow: hidden; }
        .caixa-troca { width: 100%; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .pos-cima { height: 80%; background: white; }
        .pos-baixo { height: 20%; background: #fff; cursor: pointer; border-top: 2px solid #ddd; opacity: 0.8; }
        
        svg { max-width: 95%; max-height: 95%; transform: scale(1.1); }

        /* Coluna Direita */
        .col-lateral-dir { width: 25%; border-left: 1px solid #ccc; background: #fdfdfd; padding: 15px; overflow-y: auto; }
        .titulo-vizinhos { font-size: 0.85rem; font-weight: bold; color: rgb(6, 94, 3); margin-bottom: 12px; padding-bottom: 5px; border-bottom: 1px solid #ddd; text-transform: uppercase; }
        
        .detalhe-card { margin-top: 25px; padding-top: 15px; border-top: 2px dashed #eee; }
        .detalhe-card h2 { color: #ff8c00; margin-bottom: 12px; font-size: 1.1rem; text-transform: uppercase; }
        .info-row { margin-bottom: 10px; font-size: 0.85rem; color: #444; }
        .info-label { font-weight: bold; color: #999; font-size: 0.7rem; text-transform: uppercase; display: block; }

        /* Mapas */
        path { stroke: #fff; stroke-width: 0.5; fill: #8c8c8c; transition: 0.2s; cursor: default; }
        .commrv, #grandesaopaulo { fill: rgb(6, 94, 3) !important; cursor: pointer !important; }
        .pos-cima .commrv:hover, .pos-cima #grandesaopaulo:hover { fill: #ff8c00 !important; }
        .path-ativo { fill: #ff8c00 !important; stroke: #000; stroke-width: 1px; }
        .pos-baixo path { pointer-events: none; }
    </style>
</head>
<body>

    <header><h1>Dashboard MRV - São Paulo</h1></header>

    <div class="main-wrapper">
        <aside class="col-lateral-esq" id="menu-residenciais">Carregando...</aside>
        
        <main class="col-central">
            <div class="centro-topo" id="display-nome">Selecione uma região</div>
            <div class="container-mapas" id="container-mapas">
                <div id="caixa-a" class="caixa-troca pos-cima"></div>
                <div id="caixa-b" class="caixa-troca pos-baixo" onclick="solicitarTroca()"></div>
            </div>
        </main>

        <aside class="col-lateral-dir" id="detalhes-residencial">
            <div style="text-align: center; color: #999; margin-top: 50px;">
                <p>Selecione um residencial.</p>
            </div>
        </aside>
    </div>

    <script src="mrv-data.js"></script>

    <script>
        let pathSelecionado = null;
        let botaoSelecionado = null;
        let regiaoAtual = "gsp"; 
        let DADOS_PLANILHA = [];

        const LINK_CSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQzECvkefpM6aWy0IacqqI6l84_ti6zS1lSjcrgL0J4OcrtWZLb63sh7U1ZTQ4nsqDMeTU5ykl8xtDe/pub?output=csv";

        async function carregarPlanilha() {
            try {
                const response = await fetch(LINK_CSV);
                const texto = await response.text();
                const linhas = texto.split(/\r?\n/);

                DADOS_PLANILHA = linhas.slice(1).map(linha => {
                    let col = linha.split(/[,;]/).map(c => c.trim().replace(/^["']|["']$/g, ''));
                    if (col.length < 3 || col[0].includes('http') || col[2].toLowerCase().includes('pdf') || col[2].toLowerCase().includes('lazer')) {
                        return null;
                    }
                    return {
                        id_path: col[0],
                        regiao: col[1] ? col[1].toLowerCase() : "",
                        nome: col[2],
                        estoque: parseInt(col[3]) || 0,
                        endereco: col[4],
                        bairro: col[5],
                        cidade: col[6],
                        entrega: col[7],
                        preco: col[8],
                        obra: col[11]
                    };
                }).filter(item => item !== null);

                DADOS_PLANILHA.sort((a, b) => a.nome.localeCompare(b.nome));
                gerarListaGeral();
            } catch (e) {
                document.getElementById('menu-residenciais').innerText = "Erro ao carregar dados.";
            }
        }

        // Função para formatar o texto do estoque seguindo a regra solicitada
        function formatarEstoqueBotao(qtd) {
            if (qtd === 0) return `<span class="estoque-status estoque-vendido">VENDIDO</span>`;
            if (qtd <= 5) return `<span class="estoque-status estoque-baixo">restam ${qtd} unidades</span>`;
            return `<span class="estoque-status">${qtd} unidades</span>`;
        }

        function gerarListaGeral() {
            const menu = document.getElementById('menu-residenciais');
            menu.innerHTML = "";
            DADOS_PLANILHA.forEach(item => {
                const btn = document.createElement('button');
                btn.className = 'btRes';
                btn.innerHTML = `<strong>${item.nome}</strong> ${formatarEstoqueBotao(item.estoque)}`;
                
                btn.onclick = () => {
                    if (botaoSelecionado) botaoSelecionado.classList.remove('ativo');
                    btn.classList.add('ativo');
                    botaoSelecionado = btn;

                    if (item.regiao !== regiaoAtual) solicitarTroca();
                    
                    setTimeout(() => {
                        const el = document.getElementById(item.id_path);
                        if(el) destacarNoMapa(el);
                        exibirPainelDireito(item, el ? el.getAttribute('data-name') : item.cidade);
                    }, 100);
                };
                menu.appendChild(btn);
            });
        }

        function destacarNoMapa(el) {
            if (pathSelecionado) pathSelecionado.classList.remove('path-ativo');
            el.classList.add('path-ativo');
            pathSelecionado = el;
            document.getElementById('display-nome').innerText = el.getAttribute('data-name');
        }

        function exibirPainelDireito(itemSelecionado, nomeCidade) {
            const painel = document.getElementById('detalhes-residencial');
            let html = `<div class="titulo-vizinhos">Também em ${nomeCidade || 'esta região'}:</div>`;

            const vizinhos = DADOS_PLANILHA.filter(d => d.id_path === itemSelecionado.id_path && d.nome !== itemSelecionado.nome);

            if (vizinhos.length > 0) {
                vizinhos.forEach(v => {
                    html += `
                        <button class="btRes" onclick="processarCliqueExterno('${v.nome}')">
                            <strong>${v.nome}</strong>
                            ${formatarEstoqueBotao(v.estoque)}
                        </button>`;
                });
            } else {
                html += `<p style="font-size:0.7rem; color:#999; margin-bottom:10px;">Único empreendimento nesta cidade.</p>`;
            }

            html += `
                <div class="detalhe-card">
                    <h2>${itemSelecionado.nome}</h2>
                    <div class="info-row"><span class="info-label">📍 Localização</span>${itemSelecionado.endereco || ''}<br>${itemSelecionado.bairro || ''} - ${itemSelecionado.cidade || ''}</div>
                    <div class="info-row"><span class="info-label">💰 Valor Sugerido</span>R$ ${itemSelecionado.preco || 'Sob consulta'}</div>
                    <div class="info-row"><span class="info-label">🏗️ Status</span>${itemSelecionado.obra || '---'}</div>
                    <div class="info-row"><span class="info-label">📅 Entrega</span>${itemSelecionado.entrega || '---'}</div>
                    <div class="info-row"><span class="info-label">📊 Estoque Total</span>${itemSelecionado.estoque} unidades</div>
                </div>`;

            painel.innerHTML = html;
        }

        function processarCliqueExterno(nomeResidencial) {
            const bts = document.querySelectorAll('.col-lateral-esq .btRes');
            bts.forEach(b => {
                if (b.innerText.includes(nomeResidencial.toUpperCase())) {
                    b.click();
                    b.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                }
            });
        }

        function desenhar(idContainer, dados) {
            const container = document.getElementById(idContainer);
            const paths = dados.paths.map(p => `<path id="${p.id}" data-name="${p.name || p.id}" d="${p.d}" class="${p.class}"></path>`).join('');
            container.innerHTML = `<svg viewBox="${dados.viewBox}"><g transform="${dados.transform}">${paths}</g></svg>`;
            vincularEventos();
        }

        function vincularEventos() {
            const paths = document.querySelectorAll('.pos-cima path');
            const display = document.getElementById('display-nome');
            
            paths.forEach(p => {
                p.onmouseover = () => { display.innerText = p.getAttribute('data-name'); };
                p.onmouseout = () => { display.innerText = pathSelecionado ? pathSelecionado.getAttribute('data-name') : "Selecione uma região"; };

                p.onclick = (e) => {
                    e.stopPropagation();
                    if (p.id === "grandesaopaulo") { solicitarTroca(); return; }
                    if (!p.classList.contains('commrv')) return;

                    destacarNoMapa(p);
                    const item = DADOS_PLANILHA.find(d => d.id_path === p.id);
                    if(item) {
                        exibirPainelDireito(item, p.getAttribute('data-name'));
                        const bts = document.querySelectorAll('.col-lateral-esq .btRes');
                        bts.forEach(b => {
                            if (b.innerText.includes(item.nome.toUpperCase())) {
                                if (botaoSelecionado) botaoSelecionado.classList.remove('ativo');
                                b.classList.add('ativo');
                                b.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                                botaoSelecionado = b;
                            }
                        });
                    }
                };
            });
        }

        function solicitarTroca() {
            regiaoAtual = (regiaoAtual === "gsp") ? "esp" : "gsp";
            const cA = document.getElementById('caixa-a');
            const cB = document.getElementById('caixa-b');
            const container = document.getElementById('container-mapas');
            if (pathSelecionado) pathSelecionado.classList.remove('path-ativo');
            pathSelecionado = null;

            if (cB.classList.contains('pos-baixo')) {
                cB.classList.replace('pos-baixo', 'pos-cima');
                cA.classList.replace('pos-cima', 'pos-baixo');
                container.insertBefore(cB, cA);
            } else {
                cA.classList.replace('pos-baixo', 'pos-cima');
                cB.classList.replace('pos-cima', 'pos-baixo');
                container.insertBefore(cA, cB);
            }
            vincularEventos();
        }

        window.onload = () => {
            desenhar('caixa-a', MAPA_GSP);
            desenhar('caixa-b', MAPA_INTERIOR);
            carregarPlanilha();
        };
    </script>
</body>
</html>
