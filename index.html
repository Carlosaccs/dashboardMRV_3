<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard MRV SP - Ajuste Final</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        
        body, html { height: 100vh; overflow: hidden; background: #fff; }
        
        header { background: rgb(6, 94, 3); height: 50px; display: flex; align-items: center; justify-content: center; color: white; position: relative; z-index: 10; }

        .main-wrapper { display: flex; height: calc(100% - 50px); width: 100%; }

        /* --- LARGURAS DAS COLUNAS (AJUSTADAS) --- */
        .col-lateral-esq { width: 20%; border-right: 1px solid #ccc; background: #fdfdfd; }
        .col-lateral-dir { width: 28%; border-left: 1px solid #ccc; background: #fdfdfd; }
        .col-central { flex: 1; display: flex; flex-direction: column; height: 100%; }
        
        .centro-topo { 
            height: 45px; 
            border-bottom: 1px solid #ccc; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-weight: bold; 
            text-transform: uppercase;
        }

        .container-mapas { flex: 1; display: flex; flex-direction: column; height: calc(100% - 45px); }
        
        /* --- ALTURAS E ZOOM DOS MAPAS --- */
        .caixa-troca { width: 100%; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        
        /* Cima: 80% da altura */
        .pos-cima { 
            height: 80%; 
            background: white; 
            padding: 5px; 
        }
        
        /* Baixo: 20% da altura */
        .pos-baixo { 
            height: 20%; 
            background: #ffffff; 
            cursor: pointer; 
            padding: 5px; /* Reduzi o padding para o mapa crescer */
            border-top: 2px solid #ddd;
        }

        /* Mapa de cima: +15% de tamanho */
        .pos-cima svg { 
            max-width: 100%; 
            max-height: 100%; 
            transform: scale(1.15); 
        }

        /* Mapa de baixo: Aumentado em ~25% via scale */
        .pos-baixo svg { 
            max-width: 100%; 
            max-height: 100%; 
            transform: scale(1.15); /* Aumenta ou diminui o mapa */
        }
        
        /* Estilo padrão para todos os mapas */
        path { fill: #888; stroke: #fff; stroke-width: 0.5; transition: 0.2s; }
        
        /* O efeito de cor e mãozinha SÓ vai funcionar na caixa de cima */
        .pos-cima path:hover { fill: #444 !important; cursor: pointer; }
        
        /* Desativa qualquer interação de mouse nos paths da caixa de baixo */
        .pos-baixo path { pointer-events: none; }

        /* Cores das classes */
        .semmrvZO { fill: #8c8c8c; }
        .commrvZL { fill: #006400; }
        .semmrv { fill: #8c8c8c; }
    </style>
</head>
<body>

    <header><h1>Residenciais MRV em SP</h1></header>

    <div class="main-wrapper">
        <aside class="col-lateral-esq"></aside>
        
        <main class="col-central">
            <div class="centro-topo" id="display-nome">MAPA DA GRANDE SÃO PAULO</div>
            <div class="container-mapas" id="container-mapas">
                <div id="caixa-a" class="caixa-troca pos-cima"></div>
                <div id="caixa-b" class="caixa-troca pos-baixo" onclick="solicitarTroca()"></div>
            </div>
        </main>

        <aside class="col-lateral-dir"></aside>
    </div>

    <script src="mrv-data.js"></script>

    <script>
        function desenhar(idContainer, dados) {
            const container = document.getElementById(idContainer);
            if (!dados) return;
            const paths = dados.paths.map(p => `<path id="${p.id}" d="${p.d}" class="${p.class}"></path>`).join('');
            container.innerHTML = `<svg viewBox="${dados.viewBox}" preserveAspectRatio="xMidYMid meet"><g transform="${dados.transform}">${paths}</g></svg>`;
        }

        function solicitarTroca() {
            const caixaA = document.getElementById('caixa-a');
            const caixaB = document.getElementById('caixa-b');
            const container = document.getElementById('container-mapas');
            const titulo = document.getElementById('display-nome');

            if (caixaB.classList.contains('pos-baixo')) {
                caixaB.classList.replace('pos-baixo', 'pos-cima');
                caixaA.classList.replace('pos-cima', 'pos-baixo');
                container.insertBefore(caixaB, caixaA);
                caixaB.onclick = null;
                caixaA.onclick = solicitarTroca;
                titulo.innerText = (caixaB.innerHTML.includes('adamantina')) ? "MAPA DO INTERIOR" : "MAPA DA GRANDE SÃO PAULO";
            } else {
                caixaA.classList.replace('pos-baixo', 'pos-cima');
                caixaB.classList.replace('pos-cima', 'pos-baixo');
                container.insertBefore(caixaA, caixaB);
                caixaA.onclick = null;
                caixaB.onclick = solicitarTroca;
                titulo.innerText = (caixaA.innerHTML.includes('adamantina')) ? "MAPA DO INTERIOR" : "MAPA DA GRANDE SÃO PAULO";
            }
        }

        window.onload = () => {
            desenhar('caixa-a', MAPA_GSP);
            desenhar('caixa-b', MAPA_INTERIOR);
        };
    </script>
</body>
</html>
