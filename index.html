<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard MRV SP</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body, html { height: 100vh; overflow: hidden; background: #fff; }
        header { background: rgb(6, 94, 3); height: 50px; display: flex; align-items: center; justify-content: center; color: white; z-index: 10; position: relative; }
        .main-wrapper { display: flex; height: calc(100% - 50px); width: 100%; }

        /* Colunas */
        .col-lateral-esq { width: 22%; border-right: 1px solid #ccc; background: #fdfdfd; overflow-y: auto; padding: 5px; }
        .col-lateral-dir { width: 28%; border-left: 1px solid #ccc; background: #fdfdfd; padding: 15px; overflow-y: auto; }
        .col-central { flex: 1; display: flex; flex-direction: column; position: relative; }
        
        .centro-topo { height: 45px; border-bottom: 1px solid #ccc; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 1.1rem; }
        .container-mapas { flex: 1; display: flex; flex-direction: column; position: relative; overflow: hidden; }
        .caixa-troca { width: 100%; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .pos-cima { height: 80%; background: white; }
        .pos-baixo { height: 20%; background: #fff; cursor: pointer; border-top: 2px solid #ddd; opacity: 0.8; }
        
        svg { max-width: 95%; max-height: 95%; transform: scale(1.1); }

        /* Botões Ultra Compactos */
        .btRes { 
            width: 100%; 
            padding: 3px 8px; 
            margin-bottom: 2px; 
            background: #fff; 
            border: 1px solid #eee; 
            border-left: 4px solid rgb(6, 94, 3); 
            text-align: left; 
            cursor: pointer; 
            font-size: 0.7rem; 
            border-radius: 2px; 
            display: block;
            transition: 0.1s;
        }
        .btRes:hover { background: #f9f9f9; border-left-color: #ff8c00; }
        
        /* Destaque do Botão Selecionado */
        .btn-ativo { 
            background: #fff5e6 !important; 
            border-color: #ff8c00 !important; 
            border-left-color: #ff8c00 !important; 
            font-weight: bold;
        }

        .btRes strong { display: block; color: #333; text-transform: uppercase; font-size: 0.62rem; line-height: 1; }
        .tag-regiao { font-size: 0.55rem; background: #eee; padding: 1px 3px; border-radius: 2px; float: right; color: #888; }

        /* Detalhes */
        .detalhe-card h2 { color: rgb(6, 94, 3); margin-bottom: 10px; font-size: 1rem; border-bottom: 2px solid #ff8c00; padding-bottom: 3px; }
        .info-row { margin-bottom: 8px; font-size: 0.8rem; color: #444; }
        .info-label { font-weight: bold; color: #999; font-size: 0.65rem; text-transform: uppercase; display: block; }

        /* Mapa */
        path { stroke: #fff; stroke-width: 0.5; fill: #8c8c8c; cursor: pointer; transition: 0.2s; }
        .commrv, #grandesaopaulo { fill: rgb(6, 94, 3) !important; }
        .pos-cima path:hover { fill: #ff8c00 !important; }
        .path-ativo { fill: #ff8c00 !important; stroke: #000; stroke-width: 1px; }
        .pos-baixo path { pointer-events: none; }
    </style>
</head>
<body>

    <header><h1>Dashboard MRV - São Paulo</h1></header>

    <div class="main-wrapper">
        <aside class="col-lateral-esq" id="menu-residenciais">Carregando...</aside>
        
        <main class="col-central">
            <div class="centro-topo" id="display-nome">Selecione uma região</div>
            <div class="container-mapas" id="container-mapas">
                <div id="caixa-a" class="caixa-troca pos-cima"></div>
                <div id="caixa-b" class="caixa-troca pos-baixo" onclick="solicitarTroca()"></div>
            </div>
        </main>

        <aside class="col-lateral-dir" id="detalhes-residencial">
            <div style="text-align: center; color: #999; margin-top: 50px; font-size: 0.8rem;">
                Aguardando seleção...
            </div>
        </aside>
    </div>

    <script src="mrv-data.js"></script>

    <script>
        let pathSelecionado = null;
        let botaoSelecionado = null;
        let regiaoAtual = "gsp"; 
        let DADOS_PLANILHA = [];

        // Adicionado cache para evitar erro de conexão em refresh rápido
        const LINK_CSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQzECvkefpM6aWy0IacqqI6l84_ti6zS1lSjcrgL0J4OcrtWZLb63sh7U1ZTQ4nsqDMeTU5ykl8xtDe/pub?output=csv&cache=" + new Date().getTime();

        async function carregarPlanilha() {
            try {
                const response = await fetch(LINK_CSV);
                if (!response.ok) throw new Error("Erro HTTP");
                
                const texto = await response.text();
                const linhas = texto.split(/\r?\n/);

                DADOS_PLANILHA = linhas.map(linha => {
                    let col = linha.split(/[,;]/).map(c => c.trim().replace(/^["']|["']$/g, ''));
                    
                    // Filtro para garantir que pegamos apenas linhas com dados válidos
                    // Coluna 0 deve ter o ID do path e Coluna 2 o nome do Residencial
                    if (!col[0] || col[0].length < 3 || col[0].toLowerCase().includes('pdf') || col[0].toLowerCase().includes('id')) {
                        return null;
                    }

                    return {
                        id_path: col[0],
                        regiao: col[1] ? col[1].toLowerCase() : "",
                        nome: col[2],
                        estoque: col[3],
                        endereco: col[4],
                        bairro: col[5],
                        cidade: col[6],
                        entrega: col[7],
                        preco: col[8],
                        obra: col[11]
                    };
                }).filter(item => item !== null);

                // Ordem alfabética pelo nome
                DADOS_PLANILHA.sort((a, b) => a.nome.localeCompare(b.nome));
                gerarListaGeral();
            } catch (e) {
                console.error(e);
                document.getElementById('menu-residenciais').innerHTML = 
                    `<p style="color:red; font-size:0.7rem;">Erro ao carregar dados.<br>Verifique se a planilha está publicada.</p>`;
            }
        }

        function gerarListaGeral() {
            const menu = document.getElementById('menu-residenciais');
            menu.innerHTML = "";
            
            DADOS_PLANILHA.forEach(item => {
                const btn = document.createElement('button');
                btn.className = 'btRes';
                // Salvamos o ID no botão para busca reversa
                btn.dataset.id = item.id_path;
                btn.innerHTML = `<span class="tag-regiao">${item.regiao.toUpperCase()}</span><strong>${item.nome}</strong>${item.cidade || ''}`;
                
                btn.onclick = () => {
                    marcarBotao(btn);

                    if (item.regiao !== regiaoAtual) solicitarTroca();
                    
                    setTimeout(() => {
                        const el = document.getElementById(item.id_path);
                        if(el) {
                            if (pathSelecionado) pathSelecionado.classList.remove('path-ativo');
                            el.classList.add('path-ativo');
                            pathSelecionado = el;
                            document.getElementById('display-nome').innerText = el.getAttribute('data-name');
                        }
                        exibirDetalhes(item);
                    }, 150);
                };
                menu.appendChild(btn);
            });
        }

        function marcarBotao(btn) {
            if (botaoSelecionado) botaoSelecionado.classList.remove('btn-ativo');
            btn.classList.add('btn-ativo');
            botaoSelecionado = btn;
        }

        function exibirDetalhes(item) {
            document.getElementById('detalhes-residencial').innerHTML = `
                <div class="detalhe-card">
                    <h2>${item.nome}</h2>
                    <div class="info-row"><span class="info-label">📍 Localização</span>${item.endereco || ''}<br>${item.bairro || ''} - ${item.cidade || ''}</div>
                    <div class="info-row"><span class="info-label">💰 Valor Sugerido</span>R$ ${item.preco || 'Sob consulta'}</div>
                    <div class="info-row"><span class="info-label">🏗️ Obra</span>${item.obra || '---'}</div>
                    <div class="info-row"><span class="info-label">📅 Entrega</span>${item.entrega || '---'}</div>
                    <div class="info-row"><span class="info-label">📊 Estoque</span>${item.estoque || '---'}</div>
                </div>`;
        }

        function desenhar(idContainer, dados) {
            const container = document.getElementById(idContainer);
            const paths = dados.paths.map(p => `<path id="${p.id}" data-name="${p.name || p.id}" d="${p.d}" class="${p.class}"></path>`).join('');
            container.innerHTML = `<svg viewBox="${dados.viewBox}"><g transform="${dados.transform}">${paths}</g></svg>`;
            vincularEventos();
        }

        function vincularEventos() {
            const paths = document.querySelectorAll('.pos-cima path');
            const display = document.getElementById('display-nome');
            
            paths.forEach(p => {
                p.onmouseover = () => { display.innerText = p.getAttribute('data-name'); };
                p.onmouseout = () => { display.innerText = pathSelecionado ? pathSelecionado.getAttribute('data-name') : "Selecione uma região"; };

                p.onclick = (e) => {
                    e.stopPropagation();
                    if (p.id === "grandesaopaulo") { solicitarTroca(); return; }
                    
                    if (pathSelecionado) pathSelecionado.classList.remove('path-ativo');
                    p.classList.add('path-ativo');
                    pathSelecionado = p;
                    display.innerText = p.getAttribute('data-name');

                    const item = DADOS_PLANILHA.find(d => d.id_path === p.id);
                    if(item) {
                        exibirDetalhes(item);
                        // Sincroniza destaque do botão quando clica no mapa
                        const btn = document.querySelector(`.btRes[data-id="${item.id_path}"]`);
                        if (btn) {
                            marcarBotao(btn);
                            btn.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                        }
                    }
                };
            });
        }

        function solicitarTroca() {
            regiaoAtual = (regiaoAtual === "gsp") ? "esp" : "gsp";
            const cA = document.getElementById('caixa-a');
            const cB = document.getElementById('caixa-b');
            const container = document.getElementById('container-mapas');
            
            if (pathSelecionado) pathSelecionado.classList.remove('path-ativo');
            pathSelecionado = null;

            if (cB.classList.contains('pos-baixo')) {
                cB.classList.replace('pos-baixo', 'pos-cima');
                cA.classList.replace('pos-cima', 'pos-baixo');
                container.insertBefore(cB, cA);
            } else {
                cA.classList.replace('pos-baixo', 'pos-cima');
                cB.classList.replace('pos-cima', 'pos-baixo');
                container.insertBefore(cA, cB);
            }
            vincularEventos();
        }

        window.onload = () => {
            desenhar('caixa-a', MAPA_GSP);
            desenhar('caixa-b', MAPA_INTERIOR);
            carregarPlanilha();
        };
    </script>
</body>
</html>
