<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard MRV - Diagnóstico</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body, html { height: 100%; overflow: hidden; background: #f4f4f4; }
        
        header { background: rgb(6, 94, 3); height: 50px; display: flex; align-items: center; justify-content: center; color: white; }
        
        .main-wrapper { display: flex; height: calc(100% - 50px); width: 100%; }
        .col-lateral { width: 25%; border: 1px solid #ccc; background: white; } /* Simplificado para teste */
        .col-central { flex: 1; display: flex; flex-direction: column; }
        
        .centro-topo { height: 50px; border: 1px solid #ccc; display: flex; align-items: center; justify-content: center; font-weight: bold; background: white; }
        .container-mapas { flex: 1; display: flex; flex-direction: column; position: relative; }
        
        /* Caixas de Troca */
        .caixa-troca { width: 100%; border: 1px solid #ccc; display: flex; align-items: center; justify-content: center; overflow: hidden; background: white; }
        
        /* IMPORTANTE: Sem transição para troca direta */
        .pos-cima { height: 75%; order: 1; }
        .pos-baixo { height: 25%; order: 2; background: #ffff00 !important; cursor: pointer; }

        svg { width: 100%; height: 100%; display: block; pointer-events: all; }
        path { fill: #888; stroke: #fff; stroke-width: 0.5; }

        #aviso-erro { 
            position: absolute; top: 10px; left: 10px; background: red; color: white; 
            padding: 10px; display: none; z-index: 100; font-size: 12px;
        }
    </style>
</head>
<body>

    <div id="aviso-erro"></div>

    <header><h1>Residenciais MRV em SP</h1></header>

    <div class="main-wrapper">
        <aside class="col-lateral"></aside>
        
        <main class="col-central">
            <div class="centro-topo" id="display-nome">CAIXA DE TEXTO</div>
            <div class="container-mapas" id="container-mapas">
                <div id="caixa-a" class="caixa-troca pos-cima"></div>
                <div id="caixa-b" class="caixa-troca pos-baixo" onclick="executarTroca()"></div>
            </div>
        </main>

        <aside class="col-lateral"></aside>
    </div>

    <script src="mrv-data.js"></script>

    <script>
        // Verificação de erro de carregamento
        window.addEventListener('error', function(e) {
            const erroDiv = document.getElementById('aviso-erro');
            erroDiv.style.display = 'block';
            erroDiv.innerText = "Erro no arquivo mrv-data.js: " + e.message;
        }, true);

        function renderizar(idContainer, dados) {
            const container = document.getElementById(idContainer);
            if (!dados || !dados.paths) return;

            const paths = dados.paths.map(p => `<path id="${p.id}" d="${p.d}"></path>`).join('');
            container.innerHTML = `
                <svg viewBox="${dados.viewBox}">
                    <g transform="${dados.transform}">${paths}</g>
                </svg>`;
        }

        function executarTroca() {
            const caixaA = document.getElementById('caixa-a');
            const caixaB = document.getElementById('caixa-b');

            // Troca as classes de posição/tamanho
            if (caixaB.classList.contains('pos-baixo')) {
                caixaB.classList.replace('pos-baixo', 'pos-cima');
                caixaA.classList.replace('pos-cima', 'pos-baixo');
                // Remove o clique da que subiu e coloca na que desceu
                caixaB.onclick = null;
                caixaA.onclick = executarTroca;
            } else {
                caixaA.classList.replace('pos-baixo', 'pos-cima');
                caixaB.classList.replace('pos-cima', 'pos-baixo');
                caixaA.onclick = null;
                caixaB.onclick = executarTroca;
            }
        }

        window.onload = () => {
            // Verifica se as variáveis existem antes de tentar desenhar
            if (typeof MAPA_GSP !== 'undefined' && typeof MAPA_INTERIOR !== 'undefined') {
                renderizar('caixa-a', MAPA_GSP);
                renderizar('caixa-b', MAPA_INTERIOR);
            } else {
                document.getElementById('aviso-erro').style.display = 'block';
                document.getElementById('aviso-erro').innerText = "Erro: Variáveis MAPA_GSP ou MAPA_INTERIOR não encontradas. Verifique o arquivo mrv-data.js";
            }
        };
    </script>
</body>
</html>
