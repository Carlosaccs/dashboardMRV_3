<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard MRV SP</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body, html { height: 100%; overflow: hidden; background: #fff; }
        
        header { background: rgb(6, 94, 3); height: 50px; display: flex; align-items: center; justify-content: center; color: white; position: relative; }
        .btn-sobre { position: absolute; right: 20px; background: none; border: 1px solid white; color: white; padding: 5px 10px; cursor: pointer; border-radius: 4px; }

        .main-wrapper { display: flex; height: calc(100% - 50px); width: 100%; }
        .col-lateral-esq { width: calc(100% * 2 / 9); border: 1px solid #ccc; }
        .col-lateral-dir { width: calc(100% * 3 / 9); border: 1px solid #ccc; }
        .col-central { flex: 1; display: flex; flex-direction: column; }
        
        .centro-topo { height: 50px; border: 1px solid #ccc; display: flex; align-items: center; justify-content: center; font-weight: bold; text-transform: uppercase; }
        .container-mapas { flex: 1; display: flex; flex-direction: column; }
        
        /* Caixas de Troca */
        .caixa-troca { width: 100%; border: 1px solid #ccc; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        
        .pos-cima { height: 75%; background: white; cursor: default; }
        .pos-baixo { height: 25%; background: #ffff00; cursor: pointer; }

        svg { width: 100%; height: 100%; display: block; }
        path { fill: #888; stroke: #fff; stroke-width: 0.5; }

        /* Mensagem de Erro */
        #erro-log { position: fixed; top: 0; left: 0; background: rgba(255,0,0,0.9); color: white; padding: 10px; z-index: 9999; display: none; width: 100%; font-family: monospace; }
    </style>
</head>
<body>

    <div id="erro-log"></div>

    <header>
        <h1>Residenciais MRV em SP</h1>
        <button class="btn-sobre">Sobre</button>
    </header>

    <div class="main-wrapper">
        <aside class="col-lateral-esq"></aside>
        
        <main class="col-central">
            <div class="centro-topo" id="display-nome"></div>
            <div class="container-mapas" id="container-mapas">
                <div id="caixa-a" class="caixa-troca pos-cima"></div>
                <div id="caixa-b" class="caixa-troca pos-baixo" onclick="solicitarTroca()"></div>
            </div>
        </main>

        <aside class="col-lateral-dir"></aside>
    </div>

    <script src="mrv-data.js"></script>

    <script>
        // Sistema de aviso de erro
        function avisarErro(msg) {
            const log = document.getElementById('erro-log');
            log.style.display = 'block';
            log.innerHTML = "<b>Erro detectado:</b> " + msg;
        }

        // Tenta renderizar o mapa
        function desenhar(idContainer, dados) {
            const container = document.getElementById(idContainer);
            if (!dados) {
                avisarErro("Variável de mapa não encontrada no mrv-data.js");
                return;
            }
            const paths = dados.paths.map(p => `<path id="${p.id}" d="${p.d}"></path>`).join('');
            container.innerHTML = `<svg viewBox="${dados.viewBox}"><g transform="${dados.transform}">${paths}</g></svg>`;
        }

        // Lógica de Troca corrigida
        function solicitarTroca() {
            const caixaA = document.getElementById('caixa-a');
            const caixaB = document.getElementById('caixa-b');
            const container = document.getElementById('container-mapas');

            if (caixaB.classList.contains('pos-baixo')) {
                // Troca visual
                caixaB.classList.replace('pos-baixo', 'pos-cima');
                caixaA.classList.replace('pos-cima', 'pos-baixo');
                // Troca de ordem no HTML
                container.insertBefore(caixaB, caixaA);
                // Troca a função de clique
                caixaB.onclick = null;
                caixaA.onclick = solicitarTroca;
            } else {
                caixaA.classList.replace('pos-baixo', 'pos-cima');
                caixaB.classList.replace('pos-cima', 'pos-baixo');
                container.insertBefore(caixaA, caixaB);
                caixaA.onclick = null;
                caixaB.onclick = solicitarTroca;
            }
        }

        // Inicia após carregar tudo
        window.onload = () => {
            try {
                desenhar('caixa-a', MAPA_GSP);
                desenhar('caixa-b', MAPA_INTERIOR);
            } catch (e) {
                avisarErro(e.message);
            }
        };
    </script>
</body>
</html>
