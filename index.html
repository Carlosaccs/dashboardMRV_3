<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dashboard MRV SP - Mobile Pro</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body, html { height: 100vh; width: 100vw; overflow: hidden; background: #fff; }
        
        /* AVISO DE ROTAÇÃO */
        #aviso-rotacao {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgb(6, 94, 3); color: white; z-index: 9999;
            display: none; flex-direction: column; align-items: center; justify-content: center;
            text-align: center; padding: 20px;
        }
        @media (orientation: portrait) {
            #aviso-rotacao { display: flex; }
        }

        header { 
            background: rgb(6, 94, 3); height: 40px; display: flex; 
            align-items: center; justify-content: center; color: white; 
            z-index: 100; position: relative; flex-shrink: 0;
        }

        .btn-sobre {
            position: absolute; right: 10px; background: rgba(255,255,255,0.2);
            color: white; border: 1px solid white; padding: 2px 8px;
            border-radius: 20px; cursor: pointer; font-size: 0.6rem;
        }
        
        .main-wrapper { display: flex; height: calc(100% - 40px); width: 100%; background: #fff; }

        /* AJUSTE DE LARGURA MOBILE PAISAGEM: Laterais maiores para evitar corte de texto */
        .col-lateral-esq { width: 28%; background: #fff; overflow-y: auto; padding: 5px; border-right: 1px solid #ddd; }
        .col-lateral-dir { width: 38%; background: #fff; padding: 8px; overflow-y: auto; border-left: 1px solid #ddd; }
        .col-central { flex: 1; display: flex; flex-direction: column; background: #fff; position: relative; overflow: hidden; }

        .btRes { 
            width: 100%; padding: 6px 5px; margin-bottom: 3px; background: transparent; 
            border: none; border-left: 3px solid rgb(6, 94, 3); 
            text-align: left; cursor: pointer; font-size: 0.6rem; 
            border-radius: 3px; display: flex; justify-content: space-between; align-items: center;
            line-height: 1.1;
        }
        .btRes:hover { background: #e0e0e0; }
        .btRes strong { 
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis; 
            max-width: 75%; text-transform: uppercase; margin-right: 3px;
        }
        .btRes.ativo { border-left-color: #ff8c00 !important; background: #fff5e6 !important; font-weight: bold; }
        .estoque-status { font-size: 0.55rem; font-weight: bold; color: #666; white-space: nowrap; }

        .centro-topo { height: 30px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 0.75rem; border-bottom: 1px solid #eee; background: #fdfdfd; }
        .container-mapas { flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; padding: 5px; }
        .caixa-troca { width: 100%; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; }
        .pos-cima { height: 75%; z-index: 5; }
        .pos-baixo { height: 25%; z-index: 10; cursor: pointer; opacity: 0.9; }
        
        svg { width: 100%; height: 100%; display: block; max-width: 100%; max-height: 100%; }
        path { stroke: #fff; stroke-width: 0.5; fill: #838383; transition: fill 0.15s; pointer-events: auto; }
        .commrv, #grandesaopaulo { fill: rgb(6, 94, 3) !important; }
        .path-ativo { fill: #ff8c00 !important; stroke: #000; stroke-width: 1.2px; }

        /* FICHA TÉCNICA MAIS COMPACTA */
        .ficha-card { border-left: 3px solid #ff8c00; padding: 8px; border-radius: 4px; background: #fafafa; margin-top: 5px; }
        .ficha-header { font-size: 0.75rem; color: #065e03; font-weight: bold; text-transform: uppercase; margin-bottom: 3px; display: block; }
        .local-info { font-size: 0.65rem; color: #333; margin-bottom: 8px; display: flex; align-items: flex-start; gap: 3px; line-height: 1.2; border-bottom: 1px solid #eee; padding-bottom: 4px; }
        
        .ficha-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-bottom: 8px; }
        .grid-item { font-size: 0.62rem; color: #333; }
        .grid-label { font-weight: bold; color: #666; margin-bottom: 1px; font-size: 0.55rem; text-transform: uppercase; }

        .bloco-texto { margin-bottom: 6px; padding: 6px; border-radius: 4px; font-size: 0.65rem; }
        .bloco-label { font-weight: bold; text-transform: uppercase; font-size: 0.5rem; display: block; margin-bottom: 2px; }
        .dica-box { background: #fff5e6; border: 1px solid #ffe0b3; color: #7a5a00; }
        .obs-box { background: #f1f3f5; border-left: 3px solid #adb5bd; color: #495057; }

        .secao-titulo { font-size: 0.55rem; font-weight: bold; color: #999; text-transform: uppercase; margin: 8px 0 4px 0; display: block; border-top: 1px solid #eee; padding-top: 6px; }
        
        .linha-link { display: flex; align-items: center; justify-content: space-between; padding: 4px 6px; background: #fff; border: 1px solid #eee; border-radius: 4px; margin-bottom: 3px; }
        .link-nome { font-size: 0.6rem; font-weight: bold; color: #444; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .btn-mini { padding: 4px 6px; border: none; border-radius: 3px; color: white; font-size: 0.5rem; font-weight: bold; margin-left: 2px; }
        .btn-abrir { background: #065e03; }
        .btn-copiar { background: #ff8c00; }

        /* TOAST E MODAL */
        #toast { visibility: hidden; min-width: 120px; background-color: #333; color: #fff; text-align: center; border-radius: 4px; padding: 6px; position: fixed; z-index: 1000; left: 50%; bottom: 15px; transform: translateX(-50%); font-size: 0.6rem; }
        #toast.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 1.5s; }
        @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 15px; opacity: 1;} }
        @keyframes fadeout { from {bottom: 15px; opacity: 1;} to {bottom: 0; opacity: 0;} }

        .modal-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.6); display: none; align-items: center; justify-content: center; z-index: 1000; }
        .modal-caixa { background: white; width: 80%; max-width: 350px; padding: 15px; border-radius: 10px; position: relative; text-align: center; }
        .modal-texto { font-size: 0.7rem; color: #444; line-height: 1.4; margin-bottom: 10px; text-align: left; }
        .btn-whatsapp { display: inline-block; background: #25d366; color: white; padding: 8px 15px; text-decoration: none; border-radius: 20px; font-weight: bold; font-size: 0.7rem; }
    </style>
</head>
<body>

    <div id="aviso-rotacao">
        <div style="font-size: 40px; margin-bottom: 15px;">🔄</div>
        <h2 style="margin-bottom: 8px; font-size: 1.2rem;">Gire o celular</h2>
        <p style="font-size: 0.9rem;">O Dashboard funciona melhor na horizontal.</p>
    </div>

    <header>
        <h1 style="font-size: 0.9rem;">Dashboard MRV SP</h1>
        <button class="btn-sobre" onclick="toggleModal(true)">Sobre</button>
    </header>

    <div class="main-wrapper">
        <aside class="col-lateral-esq" id="menu-residenciais"></aside>
        
        <main class="col-central">
            <div class="centro-topo" id="display-nome">Selecione</div>
            <div class="container-mapas" id="container-mapas">
                <div id="caixa-a" class="caixa-troca pos-cima"></div>
                <div id="caixa-b" class="caixa-troca pos-baixo"></div>
            </div>
        </main>

        <aside class="col-lateral-dir" id="detalhes-residencial">
            <div style="text-align: center; color: #999; margin-top: 20px; font-size: 0.6rem;">Toque num residencial.</div>
        </aside>
    </div>

    <div class="modal-overlay" id="modal-sobre" onclick="toggleModal(false)">
        <div class="modal-caixa" onclick="event.stopPropagation()">
            <div class="modal-texto">
                <strong>Dashboard MRV SP Mobile</strong><br><br>
                Informações rápidas para atendimento.<br><br>
                Envie novos materiais para colaborar!
            </div>
            <a href="https://wa.me/551192617026" target="_blank" class="btn-whatsapp">Falar com Carlos</a>
        </div>
    </div>

    <div id="toast">Copiado!</div>

    <script src="mrv-data.js"></script>
    <script>
        let pathSelecionado = null, botaoSelecionado = null, regiaoAtual = "gsp", DADOS_PLANILHA = [];

        function toggleModal(show) { document.getElementById('modal-sobre').style.display = show ? 'flex' : 'none'; }
        
        async function carregarPlanilha() {
            try {
                const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQzECvkefpM6aWy0IacqqI6l84_ti6zS1lSjcrgL0J4OcrtWZLb63sh7U1ZTQ4nsqDMeTU5ykl8xtDe/pub?output=csv&cachebuster=" + new Date().getTime();
                const response = await fetch(url);
                const texto = await response.text();
                const linhas = texto.split(/\r?\n/).filter(l => l.trim() !== "");
                DADOS_PLANILHA = linhas.slice(1).map(linha => {
                    const col = linha.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.trim().replace(/^"|"$/g, ''));
                    if (!col[2]) return null;
                    return {
                        id_path: col[0].toLowerCase().trim(), regiao: col[1] ? col[1].toLowerCase() : "", 
                        nome: col[2], estoque: col[3] || "0", endereco_comp: `${col[4]}, ${col[5]} - ${col[6]}`,
                        entrega: col[7], menor_preco: col[8], plantas_txt: `de ${col[9]} até ${col[10]}`,
                        obra: col[11], localizacao: col[12], mobilidade: col[13], cultura_lazer: col[14],
                        comercio: col[15], saude_educacao: col[16], dica: col[17], obs: col[18],  
                        book_cli: col[19], book_corr: col[20], video1: col[21], video2: col[22],
                        aptVaranda: col[23], aptSemVaranda: col[24], aptGarden: col[25], outraPlanta: col[26],
                        linkLocalizacao: col[28], linkDescritivo: col[29], div1: col[30]
                    };
                }).filter(item => item !== null);
                DADOS_PLANILHA.sort((a, b) => a.nome.localeCompare(b.nome));
                gerarListaGeral();
                desenharIniciais();
            } catch (e) { console.error(e); }
        }

        function gerarLinkDireto(url) {
            if (!url || !url.includes("drive.google.com")) return url;
            const match = url.match(/\/file\/d\/(.+?)\//) || url.match(/id=(.+?)(&|$)/);
            return (match && match[1]) ? `https://drive.google.com/file/d/${match[1].split('/')[0]}/preview` : url;
        }

        function copiarLink(url, nome) {
            if(!url || url.length < 5) return;
            navigator.clipboard.writeText(gerarLinkDireto(url)).then(() => {
                const x = document.getElementById("toast"); x.className = "show";
                setTimeout(() => { x.className = ""; }, 2000);
            });
        }

        function renderLinkRow(label, link, ico) {
            if (!link || link.length < 5) return "";
            return `<div class="linha-link"><div class="link-nome">${ico} ${label}</div><div>
                <button class="btn-mini btn-abrir" onclick="window.open('${gerarLinkDireto(link)}', '_blank')">Ver</button>
                <button class="btn-mini btn-copiar" onclick="copiarLink('${link}', '${label}')">Copy</button>
            </div></div>`;
        }

        function gerarListaGeral() {
            const menu = document.getElementById('menu-residenciais');
            menu.innerHTML = "";
            DADOS_PLANILHA.forEach(item => {
                const btn = document.createElement('button');
                btn.className = 'btRes';
                btn.id = `btn-esq-${item.nome.replace(/[^a-zA-Z0-9]/g, '-')}`;
                btn.innerHTML = `<strong>${item.nome}</strong> <span class="estoque-status">${item.estoque} u.</span>`;
                btn.onclick = () => selecionarResidencial(item, btn);
                menu.appendChild(btn);
            });
        }

        function selecionarResidencial(item, btn) {
            if (botaoSelecionado) botaoSelecionado.classList.remove('ativo');
            const btnEsq = btn || document.getElementById(`btn-esq-${item.nome.replace(/[^a-zA-Z0-9]/g, '-')}`);
            if (btnEsq) { btnEsq.classList.add('ativo'); btnEsq.scrollIntoView({ behavior: 'smooth', block: 'nearest' }); botaoSelecionado = btnEsq; }
            if (item.regiao && item.regiao !== regiaoAtual) solicitarTroca(true);
            const el = document.getElementById(item.id_path);
            if(el) destacarNoMapa(el);
            exibirPainelDireito(item, el ? el.getAttribute('data-name') : "Região");
        }

        function exibirPainelDireito(item, nomeCidade) {
            const painel = document.getElementById('detalhes-residencial');
            let html = `<div style="font-size:0.6rem; font-weight:bold; color:#065e03; margin-bottom:5px;">${nomeCidade}:</div>`;
            const vizinhos = DADOS_PLANILHA.filter(d => d.id_path === item.id_path && d.nome !== item.nome);
            vizinhos.forEach(v => {
                html += `<button class="btRes" onclick='selecionarResidencial(DADOS_PLANILHA.find(x=>x.nome=="${v.nome}"), null)'>
                            <strong>${v.nome}</strong> <span class="estoque-status">${v.estoque} u.</span>
                         </button>`;
            });
            html += `<div class="ficha-card"><span class="ficha-header">${item.nome}</span>
                    <div class="local-info">📍 ${item.endereco_comp}</div>
                    <div class="ficha-grid">
                        <div class="grid-item"><div class="grid-label">💰 Preço</div>${item.menor_preco}</div>
                        <div class="grid-item"><div class="grid-label">🔑 Entrega</div>${item.entrega}</div>
                    </div>
                    ${item.dica ? `<div class="bloco-texto dica-box"><span class="bloco-label">💡 DICA</span>${item.dica}</div>` : ''}
                    <span class="secao-titulo">Material</span>
                    ${renderLinkRow("Book", item.book_cli, "📄")}
                    ${renderLinkRow("Video", item.video1, "🎥")}
                    ${renderLinkRow("Maps", item.linkLocalizacao, "📍")}
                    <span class="secao-titulo">Plantas</span>
                    ${renderLinkRow("Varanda", item.aptVaranda, "🏢")}
                    ${renderLinkRow("Garden", item.aptGarden, "🏡")}
                </div>`;
            painel.innerHTML = html;
        }

        function destacarNoMapa(el) {
            if (pathSelecionado) pathSelecionado.classList.remove('path-ativo');
            el.classList.add('path-ativo'); pathSelecionado = el;
            document.getElementById('display-nome').innerText = el.getAttribute('data-name');
        }

        function solicitarTroca(manterFicha = false) {
            regiaoAtual = (regiaoAtual === "gsp") ? "esp" : "gsp";
            if (!manterFicha && botaoSelecionado) { botaoSelecionado.classList.remove('ativo'); botaoSelecionado = null; }
            const cA = document.getElementById('caixa-a'), cB = document.getElementById('caixa-b');
            const container = document.getElementById('container-mapas');
            if (cA.classList.contains('pos-cima')) { cA.className = 'caixa-troca pos-baixo'; cB.className = 'caixa-troca pos-cima'; container.appendChild(cA); }
            else { cB.className = 'caixa-troca pos-baixo'; cA.className = 'caixa-troca pos-cima'; container.appendChild(cB); }
            if (pathSelecionado) pathSelecionado.classList.remove('path-ativo');
            pathSelecionado = null;
            if (!manterFicha) {
                document.getElementById('detalhes-residencial').innerHTML = '<div style="text-align: center; color: #999; margin-top: 20px; font-size: 0.6rem;">Toque num residencial.</div>';
                document.getElementById('display-nome').innerText = (regiaoAtual === "gsp" ? "Grande SP" : "Interior");
            }
        }

        function desenhar(idContainer, dados) {
            const container = document.getElementById(idContainer);
            const paths = dados.paths.map(p => {
                const temMRV = DADOS_PLANILHA.some(d => d.id_path === p.id.toLowerCase());
                return `<path id="${p.id}" data-name="${p.name || p.id}" d="${p.d}" class="${(temMRV || p.id === 'grandesaopaulo') ? 'commrv' : ''}"></path>`;
            }).join('');
            container.innerHTML = `<svg viewBox="${dados.viewBox}" preserveAspectRatio="xMidYMid meet"><g transform="${dados.transform || ''}">${paths}</g></svg>`;
        }

        function desenharIniciais() {
            if (typeof MAPA_GSP !== 'undefined') desenhar('caixa-a', MAPA_GSP);
            if (typeof MAPA_INTERIOR !== 'undefined') desenhar('caixa-b', MAPA_INTERIOR);
        }

        document.getElementById('container-mapas').addEventListener('click', (e) => {
            const caixaBaixo = e.target.closest('.pos-baixo');
            if (caixaBaixo) { solicitarTroca(false); return; }
            const p = e.target.closest('.pos-cima path');
            if (p) {
                if (p.id === "grandesaopaulo") { solicitarTroca(false); return; }
                const item = DADOS_PLANILHA.find(d => d.id_path === p.id.toLowerCase());
                if(item && p.classList.contains('commrv')) selecionarResidencial(item, null);
            }
        });

        window.onload = carregarPlanilha;
    </script>
</body>
</html>
