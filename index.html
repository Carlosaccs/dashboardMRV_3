<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard MRV SP - Ajuste Fino</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        
        body, html { height: 100vh; overflow: hidden; background: #fff; }
        
        header { background: rgb(6, 94, 3); height: 50px; display: flex; align-items: center; justify-content: center; color: white; z-index: 10; }

        .main-wrapper { display: flex; height: calc(100% - 50px); width: 100%; }

        /* --- AJUSTE DE LARGURA DAS COLUNAS --- */
        /* Esquerda: -10% da largura original (era ~22%, agora ~20%) */
        .col-lateral-esq { width: 20%; border-right: 1px solid #ccc; background: #f9f9f9; }
        
        /* Direita: -80% da largura original (era ~33%, agora ~6.5%) */
        .col-lateral-dir { width: 6.5%; border-left: 1px solid #ccc; background: #f9f9f9; }
        
        /* Centro: Ganha o que as laterais perderam (ocupa ~73.5%) */
        .col-central { flex: 1; display: flex; flex-direction: column; height: 100%; }
        
        .centro-topo { 
            height: 40px; 
            border-bottom: 1px solid #ccc; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-weight: bold; 
            font-size: 0.9rem;
        }

        .container-mapas { flex: 1; display: flex; flex-direction: column; height: calc(100% - 40px); }
        
        /* --- AJUSTE DE ALTURA E TAMANHO DOS MAPAS --- */
        .caixa-troca { width: 100%; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        
        /* Cima: Aumentada (agora ocupa 82% do espaço central) */
        .pos-cima { 
            height: 82%; 
            background: white; 
            padding: 5px; /* Menos respiro para o mapa crescer */
        }
        
        /* Baixo: Reduzida em 25% (agora ocupa 18% do espaço central) */
        .pos-baixo { 
            height: 18%; 
            background: #ffff00; 
            cursor: pointer; 
            padding: 20px; /* Mais respiro para o mapa parecer menor */
            border-top: 2px solid #ccc;
        }

        /* Mapa de cima ganha escala de 15% via transform */
        .pos-cima svg { 
            max-width: 100%; 
            max-height: 100%; 
            transform: scale(1.15); /* Aumenta o mapa em 15% */
            transition: transform 0.3s ease;
        }

        /* Mapa de baixo fica contido pelo padding maior */
        .pos-baixo svg { 
            max-width: 100%; 
            max-height: 100%; 
        }
        
        path { fill: #888; stroke: #fff; stroke-width: 0.4; transition: fill 0.2s; }
        path:hover { fill: #555; cursor: pointer; }

        /* Classes de cores conforme seu dashboard anterior */
        .semmrvZO { fill: #888; }
        .commrvZL { fill: #006400; } /* Verde escuro */
    </style>
</head>
<body>

    <header><h1>Residenciais MRV em SP</h1></header>

    <div class="main-wrapper">
        <aside class="col-lateral-esq"></aside>
        
        <main class="col-central">
            <div class="centro-topo" id="display-nome">MAPA DE SÃO PAULO</div>
            <div class="container-mapas" id="container-mapas">
                <div id="caixa-a" class="caixa-troca pos-cima"></div>
                <div id="caixa-b" class="caixa-troca pos-baixo" onclick="solicitarTroca()"></div>
            </div>
        </main>

        <aside class="col-lateral-dir"></aside>
    </div>

    <script src="mrv-data.js"></script>

    <script>
        function desenhar(idContainer, dados) {
            const container = document.getElementById(idContainer);
            if (!dados) return;
            const paths = dados.paths.map(p => `<path id="${p.id}" d="${p.d}" class="${p.class}"></path>`).join('');
            container.innerHTML = `<svg viewBox="${dados.viewBox}" preserveAspectRatio="xMidYMid meet"><g transform="${dados.transform}">${paths}</g></svg>`;
        }

        function solicitarTroca() {
            const caixaA = document.getElementById('caixa-a');
            const caixaB = document.getElementById('caixa-b');
            const container = document.getElementById('container-mapas');
            const titulo = document.getElementById('display-nome');

            if (caixaB.classList.contains('pos-baixo')) {
                caixaB.classList.replace('pos-baixo', 'pos-cima');
                caixaA.classList.replace('pos-cima', 'pos-baixo');
                container.insertBefore(caixaB, caixaA);
                caixaB.onclick = null;
                caixaA.onclick = solicitarTroca;
                titulo.innerText = "MAPA DO INTERIOR";
            } else {
                caixaA.classList.replace('pos-baixo', 'pos-cima');
                caixaB.classList.replace('pos-cima', 'pos-baixo');
                container.insertBefore(caixaA, caixaB);
                caixaA.onclick = null;
                caixaB.onclick = solicitarTroca;
                titulo.innerText = "MAPA DA GRANDE SÃO PAULO";
            }
        }

        window.onload = () => {
            desenhar('caixa-a', MAPA_GSP);
            desenhar('caixa-b', MAPA_INTERIOR);
        };
    </script>
</body>
</html>
