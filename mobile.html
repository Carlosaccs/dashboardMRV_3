<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <title>Dashboard MRV SP - Mobile v3.2</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body, html { height: 100vh; width: 100vw; overflow: hidden; background: #fff; display: flex; }
        
        #aviso-rotacao {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgb(6, 94, 3); color: white; z-index: 9999;
            display: none; flex-direction: column; align-items: center; justify-content: center;
            text-align: center; padding: 20px;
        }
        @media (orientation: portrait) { #aviso-rotacao { display: flex; } }

        /* Sidebar Verde - Largura ajustada para ícones maiores */
        .sidebar-titulo {
            background: rgb(6, 94, 3);
            width: 45px; height: 100vh;
            display: flex; flex-direction: column; align-items: center; justify-content: space-between;
            padding: 15px 0; color: white; flex-shrink: 0; z-index: 30;
            cursor: pointer;
        }

        .titulo-vertical {
            writing-mode: vertical-rl; transform: rotate(180deg);
            text-transform: uppercase; font-size: 0.72rem; font-weight: bold;
            letter-spacing: 1.2px; white-space: nowrap; margin: 10px 0;
        }

        /* Ícone de Expansão/Recolhimento */
        .icon-expand { width: 30px; height: 30px; fill: white; transition: transform 0.1s; }
        .icon-expand:active { transform: scale(1.3); opacity: 0.8; }

        .main-wrapper { display: flex; flex: 1; height: 100vh; background: #fff; overflow: hidden; }

        .col-lateral-esq { width: 22%; background: #fff; overflow-y: auto; padding: 4px; border-right: 1px solid #ddd; }
        .col-central { flex: 1; display: flex; flex-direction: column; background: #fff; position: relative; overflow: hidden; }
        .col-lateral-dir { width: 33%; background: #fff; padding: 6px; overflow-y: auto; border-left: 1px solid #ddd; }

        .btRes { 
            width: 100%; padding: 6px 4px; margin-bottom: 4px; background: transparent; 
            border: none; border-left: 4px solid rgb(6, 94, 3); 
            text-align: left; cursor: pointer; font-size: 0.55rem; 
            border-radius: 2px; display: flex; justify-content: space-between; align-items: center;
        }
        .btRes strong { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 65%; text-transform: uppercase; }
        .btRes.ativo { border-left-color: #ff8c00 !important; background: #fff5e6 !important; font-weight: bold; }
        
        .estoque-status { font-size: 0.48rem; font-weight: bold; color: #777; }

        .centro-topo { height: 28px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 0.65rem; border-bottom: 1px solid #eee; background: #fdfdfd; color: #333; }
        
        .container-mapas { flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; background: #fff; }
        .caixa-troca { width: 100%; display: flex; align-items: center; justify-content: center; transition: background 0.2s; }
        
        .pos-cima { height: 75%; z-index: 5; transform: scale(1.15); }
        .pos-baixo { height: 25%; z-index: 10; cursor: pointer; transform: scale(0.95); opacity: 0.9; }
        
        .label-troca {
            position: absolute; top: 5px; left: 50%; transform: translateX(-50%);
            font-size: 0.45rem; color: #065e03; font-weight: bold; background: rgba(255,255,255,0.9); padding: 2px 8px; border-radius: 10px; border: 1px solid #eee; pointer-events: none;
        }

        svg { width: 100%; height: 100%; display: block; }
        path { stroke: #fff; stroke-width: 0.6; fill: #838383; transition: fill 0.2s; }
        .commrv, #grandesaopaulo { fill: rgb(6, 94, 3) !important; cursor: pointer; }
        .path-ativo { fill: #ff8c00 !important; stroke: #000 !important; stroke-width: 1.5px !important; }

        /* Ficha Técnica */
        .ficha-card { border-left: 3px solid #ff8c00; padding: 6px; border-radius: 4px; background: #fafafa; margin-top: 4px; }
        .ficha-header { font-size: 0.65rem; color: #065e03; font-weight: bold; text-transform: uppercase; display: flex; justify-content: space-between; align-items: center; margin-bottom: 3px; }
        .local-info { font-size: 0.5rem; color: #444; margin-bottom: 5px; border-bottom: 1px solid #eee; padding-bottom: 4px; line-height: 1.2; }
        
        .ficha-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px 6px; margin-bottom: 8px; }
        .grid-item { font-size: 0.52rem; color: #333; line-height: 1.1; }
        .grid-label { font-weight: bold; color: #777; font-size: 0.42rem; text-transform: uppercase; }

        .bloco-texto { margin-bottom: 6px; padding: 5px; border-radius: 4px; font-size: 0.52rem; line-height: 1.3; }
        .bloco-label { font-weight: bold; text-transform: uppercase; font-size: 0.45rem; display: block; margin-bottom: 2px; }
        .dica-box { background: #fff5e6; border: 1px solid #ffe0b3; color: #7a5a00; }
        .obs-box { background: #f1f3f5; border-left: 3px solid #adb5bd; color: #495057; }

        .secao-titulo { font-size: 0.48rem; font-weight: bold; color: #aaa; text-transform: uppercase; margin: 8px 0 4px 0; border-top: 1px solid #eee; padding-top: 5px; display: block; }
        
        .linha-link { display: flex; align-items: center; justify-content: space-between; padding: 4px; background: #fff; border: 1px solid #eee; border-radius: 4px; margin-bottom: 3px; }
        .link-nome { font-size: 0.5rem; font-weight: bold; color: #444; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .btn-mini { padding: 4px 6px; border: none; border-radius: 3px; color: white; font-size: 0.45rem; font-weight: bold; margin-left: 3px; }
        .btn-abrir { background: #065e03; }
        .btn-copiar { background: #ff8c00; }

        #toast { visibility: hidden; min-width: 120px; background-color: #333; color: #fff; text-align: center; border-radius: 4px; padding: 8px; position: fixed; z-index: 1000; left: 50%; bottom: 20px; transform: translateX(-50%); font-size: 0.6rem; }
        #toast.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 1.5s; }
        @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 20px; opacity: 1;} }
        @keyframes fadeout { from {bottom: 20px; opacity: 1;} to {bottom: 0; opacity: 0;} }
    </style>
</head>
<body>

    <div id="aviso-rotacao">
        <div style="font-size: 40px; margin-bottom: 15px;">🔄</div>
        <h2 style="margin-bottom: 8px;">Gire o dispositivo</h2>
        <p>Dashboard otimizado para o modo horizontal.</p>
    </div>

    <div class="sidebar-titulo" onclick="toggleFullScreen()">
        <svg class="icon-expand" viewBox="0 0 24 24"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
        <div class="titulo-vertical">RESIDENCIAIS MRV EM SP</div>
        <svg class="icon-expand" viewBox="0 0 24 24"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
    </div>

    <div class="main-wrapper">
        <aside class="col-lateral-esq" id="menu-residenciais"></aside>
        
        <main class="col-central">
            <div class="centro-topo" id="display-nome">Selecione uma região</div>
            <div class="container-mapas" id="container-mapas">
                <div id="caixa-a" class="caixa-troca pos-cima"></div>
                <div id="caixa-b" class="caixa-troca pos-baixo">
                    <div class="label-troca">↕ TROCAR REGIÃO</div>
                </div>
            </div>
        </main>

        <aside class="col-lateral-dir" id="detalhes-residencial">
            <div style="text-align: center; color: #999; margin-top: 40px; font-size: 0.55rem; padding: 10px;">Toque em uma região verde para ampliar.</div>
        </aside>
    </div>

    <div id="toast">Copiado!</div>

    <script src="mrv-data.js"></script>
    <script>
        let pathSelecionado = null, botaoSelecionado = null, regiaoAtual = "gsp", DADOS_PLANILHA = [];

        // --- FUNÇÃO DE EXPANSÃO (USADA PELO TOGGLE E PELO AUTO-EXPAND) ---
        function expandirTela() {
            if (!document.fullscreenElement && !document.webkitFullscreenElement && !document.mozFullScreenElement && !document.msFullscreenElement) {
                const el = document.documentElement;
                const rfs = el.requestFullscreen || el.webkitRequestFullScreen || el.mozRequestFullScreen || el.msRequestFullscreen;
                if (rfs) rfs.call(el).catch(err => console.log("Erro ao expandir"));
            }
        }

        function toggleFullScreen() {
            if (!document.fullscreenElement && !document.webkitFullscreenElement && !document.mozFullScreenElement && !document.msFullscreenElement) {
                expandirTela();
            } else {
                const efs = document.exitFullscreen || document.webkitExitFullscreen || document.mozCancelFullScreen || document.msExitFullscreen;
                if (efs) efs.call(document);
            }
        }

        function limparLinkDrive(url) {
            if (!url || typeof url !== 'string' || !url.includes('drive.google.com')) return url;
            const match = url.match(/\/d\/(.+?)\/|\/d\/(.+?)$|id=(.+?)(&|$)/);
            const id = match ? (match[1] || match[2] || match[3]) : null;
            if (id) return `https://drive.google.com/file/d/${id}/preview`;
            return url;
        }

        async function carregarPlanilha() {
            try {
                const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQzECvkefpM6aWy0IacqqI6l84_ti6zS1lSjcrgL0J4OcrtWZLb63sh7U1ZTQ4nsqDMeTU5ykl8xtDe/pub?output=csv&v=" + new Date().getTime();
                const response = await fetch(url);
                const texto = await response.text();
                const linhas = texto.split(/\r?\n/).filter(l => l.trim() !== "");
                
                DADOS_PLANILHA = linhas.slice(1).map(linha => {
                    const col = linha.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.trim().replace(/^"|"$/g, ''));
                    if (!col[2]) return null;
                    return {
                        id_path: col[0].toLowerCase().trim(),
                        regiao: col[1] ? col[1].toLowerCase() : "",
                        nome: col[2],
                        estoque: col[3] || "0",
                        endereco_comp: `${col[4]}, ${col[5]}`,
                        entrega: col[7],
                        menor_preco: col[8],
                        plantas_txt: `de ${col[9]} até ${col[10]}`,
                        obra: col[11],
                        dica: col[17],
                        obs: col[18],
                        book_cli: col[19], book_cor: col[20], vid1: col[21],
                        p_var: col[23], p_gar: col[25]
                    };
                }).filter(item => item !== null);

                DADOS_PLANILHA.sort((a, b) => a.nome.localeCompare(b.nome));
                gerarListaGeral();
                desenharIniciais();
            } catch (e) { console.error("Erro carga:", e); }
        }

        function renderLinkRow(label, link, ico) {
            if (!link || link.length < 5) return "";
            const linkSeguro = limparLinkDrive(link);
            return `<div class="linha-link">
                <div class="link-nome"><span>${ico}</span> ${label}</div>
                <div>
                    <button class="btn-mini btn-abrir" onclick="window.open('${linkSeguro}', '_blank')">Abrir</button>
                    <button class="btn-mini btn-copiar" onclick="copiarLink('${linkSeguro}')">Copiar</button>
                </div>
            </div>`;
        }

        function copiarLink(url) {
            navigator.clipboard.writeText(url).then(() => {
                const x = document.getElementById("toast");
                x.innerText = "Copiado!"; x.className = "show";
                setTimeout(() => { x.className = ""; }, 2000);
            });
        }

        function exibirPainelDireito(item, nomeCidade) {
            const painel = document.getElementById('detalhes-residencial');
            let html = `<div style="font-size:0.5rem; font-weight:bold; color:#065e03; margin-bottom:5px; text-transform:uppercase;">MRV em ${nomeCidade}:</div>`;
            
            DADOS_PLANILHA.filter(d => d.id_path === item.id_path && d.nome !== item.nome).forEach(v => {
                html += `<button class="btRes" onclick='event.stopPropagation(); selecionarResidencial(DADOS_PLANILHA.find(x=>x.nome=="${v.nome}"), null)'>
                            <strong>${v.nome}</strong> <span class="estoque-status">${v.estoque} u.</span>
                         </button>`;
            });

            html += `
                <div class="ficha-card">
                    <div class="ficha-header"><span>${item.nome}</span> <span style="color:#ff8c00">${item.estoque} u.</span></div>
                    <div class="local-info">📍 ${item.endereco_comp}</div>
                    <div class="ficha-grid">
                        <div class="grid-item"><div class="grid-label">💰 Preço</div>${item.menor_preco}</div>
                        <div class="grid-item"><div class="grid-label">🔑 Entrega</div>${item.entrega}</div>
                        <div class="grid-item"><div class="grid-label">📐 Plantas</div>${item.plantas_txt}</div>
                        <div class="grid-item"><div class="grid-label">🏗️ Obra</div>${item.obra}%</div>
                    </div>
                    ${item.dica ? `<div class="bloco-texto dica-box"><span class="bloco-label">💡 DICA</span>${item.dica}</div>` : ''}
                    ${item.obs ? `<div class="bloco-texto obs-box"><span class="bloco-label">📝 OBS</span>${item.obs}</div>` : ''}
                    <span class="secao-titulo">Materiais</span>
                    ${renderLinkRow("Book Cli", item.book_cli, "📄")}
                    ${renderLinkRow("Book Cor", item.book_cor, "🔐")}
                    ${renderLinkRow("Vídeo", item.vid1, "🎥")}
                    <span class="secao-titulo">Plantas</span>
                    ${renderLinkRow("Varanda", item.p_var, "🏢")}
                    ${renderLinkRow("Garden", item.p_gar, "🏡")}
                </div>`;
            painel.innerHTML = html;
        }

        function selecionarResidencial(item, btn) {
            expandirTela(); // AUTO-EXPAND AO CLICAR NA LISTA
            if (botaoSelecionado) botaoSelecionado.classList.remove('ativo');
            const btnEsq = btn || document.getElementById(`btn-esq-mob-${item.nome.replace(/[^a-zA-Z0-9]/g, '-')}`);
            if (btnEsq) { btnEsq.classList.add('ativo'); btnEsq.scrollIntoView({ behavior: 'smooth', block: 'nearest' }); botaoSelecionado = btnEsq; }
            if (item.regiao && item.regiao !== regiaoAtual) solicitarTroca(true);
            const el = document.getElementById(item.id_path);
            if(el) destacarNoMapa(el);
            exibirPainelDireito(item, el ? el.getAttribute('data-name') : "Região");
        }

        function destacarNoMapa(el) {
            if (pathSelecionado) pathSelecionado.classList.remove('path-ativo');
            el.classList.add('path-ativo'); pathSelecionado = el;
            document.getElementById('display-nome').innerText = el.getAttribute('data-name');
        }

        function solicitarTroca(manterFicha = false) {
            expandirTela(); // AUTO-EXPAND AO CLICAR NA TROCA DE REGIÃO
            regiaoAtual = (regiaoAtual === "gsp") ? "esp" : "gsp";
            if (!manterFicha && botaoSelecionado) { botaoSelecionado.classList.remove('ativo'); botaoSelecionado = null; }
            const cA = document.getElementById('caixa-a'), cB = document.getElementById('caixa-b'), container = document.getElementById('container-mapas');
            if (cA.classList.contains('pos-cima')) { cA.className = 'caixa-troca pos-baixo'; cB.className = 'caixa-troca pos-cima'; container.appendChild(cA); }
            else { cB.className = 'caixa-troca pos-baixo'; cA.className = 'caixa-troca pos-cima'; container.appendChild(cB); }
            if (pathSelecionado) pathSelecionado.classList.remove('path-ativo');
            pathSelecionado = null;
            if (!manterFicha) {
                document.getElementById('detalhes-residencial').innerHTML = '<div style="text-align: center; color: #999; margin-top: 40px; font-size: 0.55rem;">Toque em uma região verde.</div>';
                document.getElementById('display-nome').innerText = (regiaoAtual === "gsp" ? "Grande SP" : "Interior");
            }
        }

        function gerarListaGeral() {
            const menu = document.getElementById('menu-residenciais');
            menu.innerHTML = "";
            DADOS_PLANILHA.forEach(item => {
                const btn = document.createElement('button');
                btn.className = 'btRes';
                btn.id = `btn-esq-mob-${item.nome.replace(/[^a-zA-Z0-9]/g, '-')}`;
                btn.innerHTML = `<strong>${item.nome}</strong> <span class="estoque-status">${item.estoque} u.</span>`;
                btn.onclick = (e) => { e.stopPropagation(); selecionarResidencial(item, btn); };
                menu.appendChild(btn);
            });
        }

        function desenhar(idContainer, dados) {
            const container = document.getElementById(idContainer);
            const paths = dados.paths.map(p => {
                const temMRV = DADOS_PLANILHA.some(d => d.id_path === p.id.toLowerCase());
                return `<path id="${p.id}" data-name="${p.name || p.id}" d="${p.d}" class="${(temMRV || p.id === 'grandesaopaulo') ? 'commrv' : ''}"></path>`;
            }).join('');
            container.innerHTML = `<svg viewBox="${dados.viewBox}" preserveAspectRatio="xMidYMid meet"><g transform="${dados.transform || ''}">${paths}</g></svg>`;
        }

        function desenharIniciais() {
            if (typeof MAPA_GSP !== 'undefined') desenhar('caixa-a', MAPA_GSP);
            if (typeof MAPA_INTERIOR !== 'undefined') desenhar('caixa-b', MAPA_INTERIOR);
        }

        document.getElementById('container-mapas').addEventListener('click', (e) => {
            const caixaBaixo = e.target.closest('.pos-baixo');
            if (caixaBaixo) { 
                e.stopPropagation(); 
                solicitarTroca(false); 
                return; 
            }
            
            const p = e.target.closest('.pos-cima path');
            if (p) {
                e.stopPropagation();
                if (!p.classList.contains('commrv') && p.id !== "grandesaopaulo") return;

                expandirTela(); // AUTO-EXPAND AO CLICAR EM UMA CIDADE VERDE

                if (p.id === "grandesaopaulo") { solicitarTroca(false); return; }
                const item = DADOS_PLANILHA.find(d => d.id_path === p.id.toLowerCase());
                if(item) selecionarResidencial(item, null);
            }
        });

        window.onload = carregarPlanilha;
    </script>
</body>
</html>
